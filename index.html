<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小寵物中文練習店</title>
  <style>
    @font-face {
      font-family: 'ToneOZZhuyin';
      src: url('./fonts/ToneOZ-Zhuyin-Tsuipita-TC.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      color-scheme: light;
      --ink: #1f2933;
      --muted: #64748b;
      --paper: #fffaf0;
      --panel: #ffffff;
      --line: #d9e2ec;
      --green: #3a7d44;
      --teal: #177e89;
      --gold: #d99b24;
      --rose: #c44d58;
      --blue: #2f6690;
      --shadow: 0 12px 32px rgba(31, 41, 51, .14);
    }

    * { box-sizing: border-box; }

    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 250, 240, .92), rgba(236, 249, 245, .96)),
        radial-gradient(circle at top left, rgba(217, 155, 36, .16), transparent 34rem);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      color: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      letter-spacing: 0;
    }

    .subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .coins {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-weight: 800;
      white-space: nowrap;
    }

    .coin {
      width: 32px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #f7c948;
      color: #614700;
      border: 3px solid #d99b24;
    }

    main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    body[data-view="practice"] .pet-panel,
    body[data-view="pet"] .practice,
    body[data-view="pet"] .history,
    body[data-view="challenge"] .pet-panel,
    body[data-view="challenge"] .daily-card,
    body[data-view="challenge"] .mode-row {
      display: none;
    }

    body[data-view="practice"] .challenge-tabs,
    body[data-view="pet"] .challenge-tabs {
      display: none;
    }

    .app-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .view-tab, .shop-tab {
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      font-weight: 800;
    }

    .view-tab.active, .shop-tab.active {
      background: #ddf4ef;
      border-color: var(--teal);
      color: #0f5e66;
    }

    section, aside {
      background: rgba(255, 255, 255, .9);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .practice {
      padding: 18px;
    }

    .review-gate {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .review-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-weight: 800;
    }

    .study-card {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff, #f6fbff);
    }

    .study-char {
      display: grid;
      place-items: center;
      min-height: 150px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
      font-size: 5rem;
      font-weight: 900;
    }

    .zhuyin-text {
      font-family: 'ToneOZZhuyin', "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      letter-spacing: 0;
    }

    .phrase-word {
      font-family: 'ToneOZZhuyin', "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", system-ui, sans-serif;
      font-size: 1.18em;
      font-weight: 900;
      margin-right: 4px;
    }

    .study-fields {
      display: grid;
      gap: 8px;
      font-weight: 800;
    }

    .study-line span {
      color: var(--muted);
      margin-right: 6px;
    }

    .phrase-group {
      margin-top: 8px;
    }

    .phrase-group h3 {
      margin: 0 0 6px;
      font-size: 1rem;
      color: var(--blue);
    }

    .phrase-group ul {
      margin: 0;
      padding-left: 20px;
    }

    .review-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .challenge-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .mode, .challenge-tab {
      min-height: 42px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }

    .mode.active, .challenge-tab.active {
      background: #ddf4ef;
      border-color: var(--teal);
      color: #0f5e66;
      font-weight: 800;
    }

    .question {
      min-height: 260px;
      display: grid;
      place-items: center;
      text-align: center;
      background: linear-gradient(135deg, #eff8f4, #fff8e8);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
    }

    .prompt-label {
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .big-char {
      font-size: clamp(4.4rem, 15vw, 8.5rem);
      line-height: 1;
      font-weight: 900;
    }

    .meaning {
      margin-top: 12px;
      font-size: 1.3rem;
      color: var(--blue);
      font-weight: 800;
    }

    .answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .answer {
      min-height: 66px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #ffffff;
      font-size: clamp(1.05rem, 2.8vw, 1.45rem);
      font-weight: 800;
      transition: transform .15s, border-color .15s, background .15s;
    }

    .answer:hover {
      transform: translateY(-1px);
      border-color: var(--teal);
    }

    .answer.correct {
      background: #d9f8e6;
      border-color: var(--green);
    }

    .answer.wrong {
      background: #ffe3e3;
      border-color: var(--rose);
    }

    .feedback {
      min-height: 38px;
      margin-top: 12px;
      font-weight: 800;
      color: var(--teal);
    }

    .timer-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-weight: 800;
    }

    .timer {
      min-width: 54px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--rose);
    }

    .sentence {
      font-size: clamp(1.7rem, 5vw, 3.6rem);
      line-height: 1.35;
      font-weight: 900;
    }

    .blank {
      display: inline-grid;
      place-items: center;
      min-width: 1.8em;
      margin: 0 4px;
      border-bottom: 6px solid var(--teal);
      color: transparent;
    }

    .bubble-arena {
      display: none;
      position: relative;
      min-height: 285px;
      margin-top: 14px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, #e8f7ff, #fff8df);
    }

    .bubble-arena.show {
      display: block;
    }

    .bubble {
      position: absolute;
      width: 76px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgba(255, 255, 255, .78);
      border: 3px solid rgba(23, 126, 137, .45);
      box-shadow: inset 0 -10px 18px rgba(47, 102, 144, .12), 0 8px 16px rgba(31, 41, 51, .12);
      display: grid;
      place-items: center;
      font-size: 2.1rem;
      font-weight: 900;
      animation: floatUp 6s linear forwards;
    }

    @keyframes floatUp {
      from { transform: translateY(290px); opacity: 1; }
      to { transform: translateY(-110px); opacity: .78; }
    }

    .daily-card {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
    }

    .daily-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      color: var(--muted);
      font-weight: 800;
    }

    .date-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .date-input {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 9px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    .word-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .word-chip {
      padding: 7px 10px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid var(--line);
      font-weight: 900;
      font-size: 1.15rem;
    }

    .character-list {
      margin-top: 16px;
    }

    .character-list label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      color: var(--muted);
      font-weight: 700;
    }

    textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
      color: var(--ink);
    }

    .small-button {
      min-height: 38px;
      padding: 7px 11px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
      white-space: nowrap;
    }

    .pet-panel {
      overflow: hidden;
    }

    .pet-panel {
      max-width: 980px;
      margin: 0 auto;
      width: 100%;
    }

    .yard {
      min-height: 310px;
      display: grid;
      place-items: center;
      padding: 18px;
      background:
        linear-gradient(180deg, #d8f3dc 0 58%, #c9a66b 58% 100%);
      position: relative;
    }

    .pet {
      width: 230px;
      height: 310px;
      position: relative;
      transform-origin: bottom center;
      animation: bounce 2.3s ease-in-out infinite;
      filter: drop-shadow(0 15px 15px rgba(31, 41, 51, .22));
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(-1deg); }
      50% { transform: translateY(-8px) rotate(1deg); }
    }

    .pet-body {
      position: absolute;
      left: 54px;
      top: 138px;
      width: 122px;
      height: 118px;
      border-radius: 45% 45% 38% 38%;
      background: #f4a261;
      border: 5px solid #9a5f36;
    }

    .pet-head {
      position: absolute;
      left: 45px;
      top: 44px;
      width: 140px;
      height: 124px;
      border-radius: 48% 48% 42% 42%;
      background: #f4a261;
      border: 5px solid #9a5f36;
      z-index: 2;
    }

    .ear {
      position: absolute;
      top: 28px;
      width: 54px;
      height: 72px;
      background: #f4a261;
      border: 5px solid #9a5f36;
      border-radius: 60% 60% 25% 25%;
      z-index: 1;
    }

    .ear.left { left: 40px; transform: rotate(-24deg); }
    .ear.right { right: 40px; transform: rotate(24deg); }

    .arm, .leg, .foot {
      position: absolute;
      background: #f4a261;
      border: 5px solid #9a5f36;
      z-index: 1;
    }

    .arm {
      top: 160px;
      width: 42px;
      height: 86px;
      border-radius: 999px;
    }

    .arm.left { left: 28px; transform: rotate(18deg); }
    .arm.right { right: 28px; transform: rotate(-18deg); }

    .leg {
      top: 232px;
      width: 42px;
      height: 56px;
      border-radius: 999px;
    }

    .leg.left { left: 72px; }
    .leg.right { right: 72px; }

    .foot {
      top: 274px;
      width: 58px;
      height: 28px;
      border-radius: 999px;
    }

    .foot.left { left: 52px; }
    .foot.right { right: 52px; }

    .eye {
      position: absolute;
      top: 91px;
      width: 16px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #1f2933;
      z-index: 3;
    }

    .eye.left { left: 83px; }
    .eye.right { right: 83px; }

    .nose {
      position: absolute;
      top: 121px;
      left: 50%;
      width: 24px;
      height: 18px;
      border-radius: 50%;
      background: #51312b;
      transform: translateX(-50%);
      z-index: 3;
    }

    .mouth {
      position: absolute;
      top: 141px;
      left: 50%;
      width: 48px;
      height: 24px;
      border-bottom: 5px solid #51312b;
      border-radius: 0 0 40px 40px;
      transform: translateX(-50%);
      z-index: 3;
    }

    .accessory {
      position: absolute;
      font-size: 2.2rem;
      display: none;
      z-index: 5;
      pointer-events: none;
    }

    .accessory.show { display: block; }

    .accessory-head {
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
    }

    .accessory-body {
      left: 50%;
      top: 170px;
      transform: translateX(-50%);
    }

    .accessory-feet {
      left: 50%;
      top: 280px;
      transform: translateX(-50%);
      width: 150px;
      text-align: center;
      font-size: 2rem;
      letter-spacing: 22px;
    }

    .accessory-toy {
      right: 2px;
      bottom: 14px;
      font-size: 2.4rem;
    }

    .stats {
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .stat {
      display: grid;
      grid-template-columns: 82px 1fr 42px;
      gap: 9px;
      align-items: center;
      font-weight: 800;
    }

    .bar {
      height: 14px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf2f7;
      border: 1px solid var(--line);
    }

    .fill {
      height: 100%;
      width: 50%;
      border-radius: inherit;
      background: var(--teal);
      transition: width .25s;
    }

    .shop {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .shop-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 14px 12px;
    }

    .shop-title {
      padding: 14px 14px 8px;
      margin: 0;
      font-size: 1.2rem;
    }

    .item {
      min-height: 86px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      display: grid;
      gap: 4px;
      place-items: center;
      padding: 10px 8px;
      font-weight: 800;
    }

    .item:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .item.owned {
      border-color: var(--green);
      background: #f0fff4;
    }

    .item.active {
      outline: 3px solid rgba(23, 126, 137, .28);
      border-color: var(--teal);
    }

    .item-icon {
      font-size: 1.8rem;
      line-height: 1;
    }

    .price {
      color: var(--gold);
      font-size: .92rem;
    }

    .history {
      margin-top: 18px;
      padding: 14px;
      display: grid;
      gap: 8px;
      grid-column: 1 / -1;
    }

    .history h2 {
      margin: 0;
      font-size: 1.15rem;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .parent-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .parent-stat {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .parent-stat strong {
      display: block;
      font-size: 1.25rem;
      margin-bottom: 2px;
    }

    .history-list {
      display: grid;
      gap: 7px;
    }

    .history-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      font-weight: 800;
    }

    .pet.pet-panda .pet-head,
    .pet.pet-panda .pet-body,
    .pet.pet-panda .arm,
    .pet.pet-panda .leg,
    .pet.pet-panda .foot,
    .pet.pet-panda .ear {
      background: #f8fafc;
      border-color: #2f3a45;
    }

    .pet.pet-cat .pet-head,
    .pet.pet-cat .pet-body,
    .pet.pet-cat .arm,
    .pet.pet-cat .leg,
    .pet.pet-cat .foot,
    .pet.pet-cat .ear {
      background: #f7c948;
      border-color: #8a6116;
    }

    .pet.pet-bunny .pet-head,
    .pet.pet-bunny .pet-body,
    .pet.pet-bunny .arm,
    .pet.pet-bunny .leg,
    .pet.pet-bunny .foot,
    .pet.pet-bunny .ear {
      background: #f9c6d3;
      border-color: #a24a61;
    }

    .pet.pet-fox .pet-head,
    .pet.pet-fox .pet-body,
    .pet.pet-fox .arm,
    .pet.pet-fox .leg,
    .pet.pet-fox .foot,
    .pet.pet-fox .ear,
    .pet.pet-tiger .pet-head,
    .pet.pet-tiger .pet-body,
    .pet.pet-tiger .arm,
    .pet.pet-tiger .leg,
    .pet.pet-tiger .foot,
    .pet.pet-tiger .ear {
      background: #f97316;
      border-color: #8a3f12;
    }

    .pet.pet-bear .pet-head,
    .pet.pet-bear .pet-body,
    .pet.pet-bear .arm,
    .pet.pet-bear .leg,
    .pet.pet-bear .foot,
    .pet.pet-bear .ear,
    .pet.pet-hamster .pet-head,
    .pet.pet-hamster .pet-body,
    .pet.pet-hamster .arm,
    .pet.pet-hamster .leg,
    .pet.pet-hamster .foot,
    .pet.pet-hamster .ear {
      background: #b08968;
      border-color: #6b4930;
    }

    .pet.pet-koala .pet-head,
    .pet.pet-koala .pet-body,
    .pet.pet-koala .arm,
    .pet.pet-koala .leg,
    .pet.pet-koala .foot,
    .pet.pet-koala .ear {
      background: #cbd5e1;
      border-color: #64748b;
    }

    .pet.pet-unicorn .pet-head,
    .pet.pet-unicorn .pet-body,
    .pet.pet-unicorn .arm,
    .pet.pet-unicorn .leg,
    .pet.pet-unicorn .foot,
    .pet.pet-unicorn .ear {
      background: #d8b4fe;
      border-color: #7c3aed;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: #e8f4f8;
      color: #1f5f78;
      font-weight: 800;
      border: 1px solid #c8e3ec;
    }

    @media (max-width: 840px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      main {
        grid-template-columns: 1fr;
      }

      .answers, .shop {
        grid-template-columns: 1fr;
      }

      .study-card {
        grid-template-columns: 1fr;
      }

      .parent-grid, .history-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>小寵物中文練習店</h1>
        <p class="subtitle">答對中文題目賺錢，照顧自己的小寵物。</p>
      </div>
      <div class="coins" aria-live="polite">
        <span class="coin">$</span>
        <span><span id="coins">0</span> 元</span>
      </div>
    </header>

    <nav class="app-tabs" aria-label="主要頁面">
      <button class="view-tab active" data-view="practice">每日練習</button>
      <button class="view-tab" data-view="challenge">中文挑戰</button>
      <button class="view-tab" data-view="pet">寵物商店</button>
    </nav>

    <main>
      <section class="practice" aria-labelledby="practice-title">
        <div id="reviewGate" class="review-gate">
          <div class="review-top">
            <span id="reviewProgress">生字卡 1 / 1</span>
            <span>先看完今天的生字卡，才可以開始遊戲。</span>
          </div>
          <div class="study-card zhuyin-text">
            <div id="studyChar" class="study-char zhuyin-text">字</div>
            <div class="study-fields">

            <div id="accessoryToy" class="accessory accessory-toy"></div>
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="pet-head"></div>
            <div class="pet-body"></div>
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="leg left"></div>
            <div class="leg right"></div>
            <div class="foot left"></div>
            <div class="foot right"></div>

          <div class="stat">
            <span>肚子</span>

            <span id="hungerText">55</span>
          </div>
          <div class="stat">
            <span>開心</span>
            <div class="bar"><div id="happy" class="fill"></div></div>
            <span id="happyText">55</span>
          </div>
          <div class="stat">
            <span>乾淨</span>
            <div class="bar"><div id="clean" class="fill"></div></div>
            <span id="cleanText">55</span>
          </div>

        <div id="shopTabs" class="shop-tabs"></div>
        <div id="shop" class="shop"></div>

      <section class="history" aria-labelledby="progress-title">
        <h2 id="progress-title">今日小成就</h2>
        <div id="badges" class="badges">
          <span class="badge">開始練習</span>
        </div>

        <button id="clearHistory" class="small-button">清除紀錄</button>
        <div id="parentStats" class="parent-grid"></div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>
  </div>

  <script src="game-data.js"></script>
  <script>
    const DATA = window.ZH_REVIEW_DATA;
    const state = {
      coins: 0,
      streak: 0,
      mode: "charMeaning",
      current: null,
      locked: false,
      timerId: null,
      bubbleId: null,
      timeLeft: 5,
      stats: { hunger: 55, happy: 55, clean: 55 },
      words: [],
      phrasePool: [],
      activeDate: "",
      reviewIndex: 0,
      reviewComplete: false,
      challengeMode: false,
      challengeType: "quick",
      bubbleLives: 3,
      bubbleMissed: [],
      bubbleTargetTimer: null,
      missedReviewIndex: 0,
      shopCategory: "pets",
      inventory: { pet: "dog", accessories: [], equipped: {}, owned: ["dog"], ownedPets: ["dog"] },
      petStats: { dog: { hunger: 55, happy: 55, clean: 55 } },
      history: {},
      earnedBadges: new Set(["開始練習"])
    };

    const el = {
      coins: document.querySelector("#coins"),
      promptLabel: document.querySelector("#promptLabel"),
      prompt: document.querySelector("#prompt"),
      promptExtra: document.querySelector("#promptExtra"),
      answers: document.querySelector("#answers"),
      feedback: document.querySelector("#feedback"),
      timerRow: document.querySelector("#timerRow"),
      timer: document.querySelector("#timer"),
      bubbleArena: document.querySelector("#bubbleArena"),
      dailyTitle: document.querySelector("#dailyTitle"),
      practiceDate: document.querySelector("#practiceDate"),
      dailyWords: document.querySelector("#dailyWords"),
      reloadDaily: document.querySelector("#reloadDaily"),
      badges: document.querySelector("#badges"),
      parentStats: document.querySelector("#parentStats"),
      historyList: document.querySelector("#historyList"),
      clearHistory: document.querySelector("#clearHistory"),
      reviewGate: document.querySelector("#reviewGate"),
      reviewProgress: document.querySelector("#reviewProgress"),
      studyChar: document.querySelector("#studyChar"),
      studyBopomofo: document.querySelector("#studyBopomofo"),
      studyRadical: document.querySelector("#studyRadical"),
      studyDefinition: document.querySelector("#studyDefinition"),
      studyPhrases: document.querySelector("#studyPhrases"),
      prevCard: document.querySelector("#prevCard"),
      nextCard: document.querySelector("#nextCard"),
      finishReview: document.querySelector("#finishReview"),
      shopTabs: document.querySelector("#shopTabs"),
      shop: document.querySelector("#shop"),
      pet: document.querySelector("#pet"),
      accessoryHead: document.querySelector("#accessoryHead"),
      accessoryBody: document.querySelector("#accessoryBody"),
      accessoryFeet: document.querySelector("#accessoryFeet"),
      accessoryToy: document.querySelector("#accessoryToy"),
      hunger: document.querySelector("#hunger"),
      happy: document.querySelector("#happy"),
      clean: document.querySelector("#clean"),
      hungerText: document.querySelector("#hungerText"),
      happyText: document.querySelector("#happyText"),
      cleanText: document.querySelector("#cleanText")
    };

    const shopCategories = {
      pets: { label: "寵物", items: [
        ["dog", "🐶", "小狗", 0], ["panda", "🐼", "熊貓", 30], ["cat", "🐱", "小貓", 30], ["bunny", "🐰", "兔兔", 30], ["fox", "🦊", "狐狸", 35],
        ["bear", "🐻", "小熊", 35], ["hamster", "🐹", "倉鼠", 25], ["koala", "🐨", "無尾熊", 35], ["tiger", "🐯", "小虎", 40], ["unicorn", "🦄", "獨角獸", 50]
      ] },
      food: { label: "食物", items: [
        ["apple", "🍎", "蘋果", 5], ["banana", "🍌", "香蕉", 5], ["carrot", "🥕", "紅蘿蔔", 6], ["rice", "🍚", "白飯", 6], ["noodles", "🍜", "麵麵", 8],
        ["cookie", "🍪", "餅乾", 7], ["cake", "🍰", "蛋糕", 10], ["milk", "🥛", "牛奶", 6], ["fish", "🐟", "小魚", 8], ["bento", "🍱", "便當", 12]
      ] },
      toys: { label: "玩具", items: [
        ["ball", "⚽", "球球", 10], ["bearToy", "🧸", "娃娃", 8], ["kite", "🪁", "風箏", 12], ["blocks", "🧩", "拼圖", 12], ["music", "🎵", "音樂盒", 14],
        ["paint", "🎨", "畫筆", 13], ["train", "🚂", "小火車", 16], ["rocket", "🚀", "火箭", 18], ["game", "🎮", "遊戲機", 20], ["book", "📚", "故事書", 10]
      ] },
      clothes: { label: "衣服", items: [
        ["bow", "🎀", "蝴蝶結", 15], ["crown", "👑", "皇冠", 25], ["hat", "🎩", "帽子", 16], ["cap", "🧢", "棒球帽", 14], ["scarf", "🧣", "圍巾", 18],
        ["dress", "👗", "洋裝", 24], ["shirt", "👕", "上衣", 18], ["coat", "🧥", "外套", 28], ["glasses", "👓", "眼鏡", 16], ["medal", "🏅", "獎牌", 22]
      ] },
      shoes: { label: "鞋子", items: [
        ["sneakers", "👟", "球鞋", 18], ["boots", "🥾", "靴子", 20], ["flats", "🥿", "平底鞋", 16], ["heels", "👠", "亮亮鞋", 22], ["sandals", "🩴", "涼鞋", 14],
        ["skates", "⛸️", "溜冰鞋", 26], ["socks", "🧦", "襪子", 10], ["runner", "🏃", "跑跑鞋", 24], ["dance", "💃", "跳舞鞋", 28], ["rainboots", "☔", "雨鞋", 18]
      ] }
    };

    const shop = {};
    const headItems = new Set(["bow", "crown", "hat", "cap", "glasses", "medal"]);
    const feetItems = new Set(["sneakers", "boots", "flats", "heels", "sandals", "skates", "socks", "runner", "dance", "rainboots"]);
    Object.entries(shopCategories).forEach(([category, group]) => {
      group.items.forEach(([key, icon, name, price]) => {
        const slot = category === "shoes" ? "feet" : category === "toys" ? "toy" : headItems.has(key) ? "head" : category === "clothes" ? "body" : null;
        shop[key] = {
          key, icon, name, price, category,
          pet: category === "pets" ? key : null,
          accessory: category === "clothes" || category === "shoes" || category === "toys" ? icon : null,
          slot,
          stat: category === "food" ? "hunger" : category === "toys" ? "happy" : null,
          amount: category === "food" ? 18 : category === "toys" ? 14 : 0,
          message: `${name}買好了！`
        };
      });
    });

    function todayKey() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      return local.toISOString().slice(0, 10);
    }

    function formatMoney(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem("zhPetReviewProgress") || "{}");
        state.coins = saved.coins ?? state.coins;
        state.stats = saved.stats || state.stats;
        state.inventory = saved.inventory || state.inventory;
        state.inventory.accessories ||= [];
        state.inventory.equipped ||= {};
        state.inventory.owned ||= [];
        state.inventory.ownedPets ||= [state.inventory.pet || "dog"];
        if (!state.inventory.ownedPets.includes("dog")) state.inventory.ownedPets.unshift("dog");
        if (!state.inventory.owned.includes("dog")) state.inventory.owned.unshift("dog");
        state.petStats = saved.petStats || { [state.inventory.pet || "dog"]: saved.stats || state.stats };
        state.inventory.ownedPets.forEach(pet => state.petStats[pet] ||= { hunger: 55, happy: 55, clean: 55 });
        state.stats = state.petStats[state.inventory.pet] || state.stats;
        state.history = saved.history || {};
      } catch {
        state.history = {};
      }
    }

    function saveProgress() {
      localStorage.setItem("zhPetReviewProgress", JSON.stringify({
        coins: state.coins,
        stats: state.stats,
        petStats: state.petStats,
        inventory: state.inventory,
        history: state.history
      }));
    }

    function dayRecord(date = state.activeDate || todayKey()) {
      state.history[date] ||= { played: 0, correct: 0, firstTry: 0, secondTry: 0, wrong: 0, coins: 0 };
      return state.history[date];
    }

    function recordQuestion(result, reward = 0) {
      const record = dayRecord();
      record.played += 1;
      record.coins = Math.round((record.coins + reward) * 10) / 10;
      if (result === "first") {
        record.correct += 1;
        record.firstTry += 1;
      } else if (result === "second") {
        record.correct += 1;
        record.secondTry += 1;
      } else {
        record.wrong += 1;
      }
      saveProgress();
      renderParentDashboard();
    }

    function activeScheduleDate() {
      if (el.practiceDate?.value && DATA.schedule[el.practiceDate.value]) return el.practiceDate.value;
      const dates = Object.keys(DATA.schedule).sort();
      const today = todayKey();
      if (DATA.schedule[today]?.length) return today;
      const previous = dates.filter(date => date <= today && DATA.schedule[date]?.length).pop();
      return previous || dates.find(date => DATA.schedule[date]?.length) || dates[0];
    }

    function buildPools() {
      const date = activeScheduleDate();
      state.activeDate = date;
      el.practiceDate.value = date;
      state.reviewIndex = 0;
      state.reviewComplete = false;
      el.finishReview.textContent = "我看完了，開始遊戲";
      const chars = [...new Set(DATA.schedule[date] || [])].filter(char => DATA.entries[char]);
      state.words = chars.map(char => ({ char, ...DATA.entries[char] }));
      state.phrasePool = state.words.flatMap(item =>
        (item.phrases || []).map(phrase => ({ ...phrase, char: item.char, bopomofo: item.bopomofo }))
      ).filter(phrase => phrase.word.length >= 2 && phrase.zh.length >= 4);

      if (state.words.length < 4) {
        state.words = Object.entries(DATA.entries).slice(0, 20).map(([char, entry]) => ({ char, ...entry }));
      }
      if (state.phrasePool.length < 4) {
        state.phrasePool = Object.entries(DATA.entries).flatMap(([char, entry]) =>
          (entry.phrases || []).map(phrase => ({ ...phrase, char, bopomofo: entry.bopomofo }))
        ).filter(phrase => phrase.word.length >= 2 && phrase.zh.length >= 4).slice(0, 80);
      }

      el.dailyTitle.textContent = `${date} 複習`;
      el.dailyWords.innerHTML = "";
      state.words.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "word-chip";
        chip.textContent = `${item.char} ${item.bopomofo}`;
        el.dailyWords.append(chip);
      });
      renderReviewCard();
      setPracticeLocked(true);
    }

    function buildChallengePools() {
      const today = todayKey();
      const chars = [...new Set(Object.entries(DATA.schedule)
        .filter(([date]) => date <= today)
        .flatMap(([, list]) => list || []))]
        .filter(char => DATA.entries[char]);
      state.words = chars.map(char => ({ char, ...DATA.entries[char] }));
      state.phrasePool = state.words.flatMap(item =>
        (item.phrases || []).map(phrase => ({ ...phrase, char: item.char, bopomofo: item.bopomofo }))
      ).filter(phrase => phrase.word.length >= 2 && phrase.zh.length >= 4);
      if (state.words.length < 4) {
        state.words = Object.entries(DATA.entries).slice(0, 80).map(([char, entry]) => ({ char, ...entry }));
      }
      if (state.phrasePool.length < 4) {
        state.phrasePool = Object.entries(DATA.entries).flatMap(([char, entry]) =>
          (entry.phrases || []).map(phrase => ({ ...phrase, char, bopomofo: entry.bopomofo }))
        ).filter(phrase => phrase.word.length >= 2 && phrase.zh.length >= 4).slice(0, 120);
      }
      state.reviewComplete = true;
      el.reviewGate.hidden = true;
      document.querySelector(".question").hidden = false;
      el.answers.hidden = false;
      el.feedback.hidden = false;
      el.bubbleArena.hidden = false;
      pickQuestion();
    }

    function setPracticeLocked(locked) {
      state.reviewComplete = !locked;
      document.querySelector(".mode-row").hidden = true;
      document.querySelector(".question").hidden = locked;
      el.answers.hidden = locked;
      el.feedback.hidden = locked;
      el.bubbleArena.hidden = locked;
      el.reviewGate.hidden = !locked;
      if (!locked) pickQuestion();
    }

    function renderReviewCard() {
      const item = state.words[state.reviewIndex] || state.words[0];
      if (!item) return;
      el.reviewProgress.textContent = `生字卡 ${state.reviewIndex + 1} / ${state.words.length}`;
      el.studyChar.textContent = item.char;
      el.studyBopomofo.textContent = item.bopomofo || "";
      el.studyRadical.textContent = item.radical || "";
      el.studyDefinition.textContent = item.definition || "";
      const groups = {};
      (item.phrases || []).forEach(phrase => {
        const length = Math.min([...phrase.word].length, 4);
        groups[length] ||= [];
        groups[length].push(phrase);
      });
      el.studyPhrases.innerHTML = "";
      Object.keys(groups).sort((a, b) => Number(a) - Number(b)).forEach(length => {
        const group = document.createElement("div");
        group.className = "phrase-group";
        group.innerHTML = `<h3>常用詞（${length}字）</h3>`;
        const list = document.createElement("ul");
        groups[length].slice(0, 3).forEach(phrase => {
          const li = document.createElement("li");
          li.className = "zhuyin-text";
          li.innerHTML = `<span class="phrase-word">${phrase.word}</span>：${phrase.zh}`;
          list.append(li);
        });
        group.append(list);
        el.studyPhrases.append(group);
      });
      el.prevCard.disabled = state.reviewIndex === 0;
      el.nextCard.textContent = state.reviewIndex === state.words.length - 1 ? "最後一張" : "下一張";
      el.nextCard.disabled = state.reviewIndex === state.words.length - 1;
      el.finishReview.disabled = state.reviewIndex !== state.words.length - 1;
    }

    function sample(list, count) {
      return [...list].sort(() => Math.random() - .5).slice(0, count);
    }

    function resetRoundUi() {
      state.locked = false;
      clearInterval(state.timerId);
      clearInterval(state.bubbleId);
      clearInterval(state.bubbleTargetTimer);
      state.timerId = null;
      state.bubbleId = null;
      state.bubbleTargetTimer = null;
      el.feedback.textContent = "";
      el.answers.innerHTML = "";
      el.bubbleArena.innerHTML = "";
      el.bubbleArena.classList.remove("show");
      el.timerRow.hidden = true;
    }

    function pickQuestion() {
      if (!state.reviewComplete && !state.challengeMode) return;
      resetRoundUi();
      if (state.challengeMode && state.challengeType === "bubble") return showBubblePop();
      if (state.challengeMode || !state.challengeMode) {
        state.mode = sample(["charMeaning", "phraseMeaning", "sentenceBlank"], 1)[0];
      }
      if (state.mode === "charMeaning") return showCharMeaning();
      if (state.mode === "phraseMeaning") return showPhraseMeaning();
      if (state.mode === "sentenceBlank") return showSentenceBlank();
      showBubblePop();
    }

    function showCharMeaning() {
      const word = state.words[Math.floor(Math.random() * state.words.length)];
      const choices = sample(state.words.filter(item => item.char !== word.char), 3).concat(word);
      state.current = { type: "char", answer: word.char, hint: word.definition, misses: 0 };
      el.promptLabel.textContent = "這個字是什麼意思？";
      el.prompt.textContent = word.char;
      el.prompt.className = "big-char";
      el.promptExtra.textContent = word.bopomofo;
      renderAnswers(sample(choices, choices.length), item => item.definition, item => item.char === word.char);
    }

    function showPhraseMeaning() {
      const phrase = state.phrasePool[Math.floor(Math.random() * state.phrasePool.length)];
      const choices = sample(state.phrasePool.filter(item => item.word !== phrase.word), 3).concat(phrase);
      state.current = { type: "phrase", answer: phrase.word, hint: phrase.zh, misses: 0 };
      el.promptLabel.textContent = "這個語詞是什麼意思？";
      el.prompt.textContent = phrase.word;
      el.prompt.className = "sentence";
      el.promptExtra.textContent = phrase.bopomofo;
      renderAnswers(sample(choices, choices.length), item => item.zh, item => item.word === phrase.word);
    }

    function showSentenceBlank() {
      const usable = state.phrasePool.filter(item => [...item.word].includes(item.char));
      const phrase = usable[Math.floor(Math.random() * usable.length)] || state.phrasePool[0];
      const blanked = phrase.word.replace(phrase.char, "＿");
      const choices = sample(state.words.filter(item => item.char !== phrase.char), 3).concat(
        state.words.find(item => item.char === phrase.char) || { char: phrase.char }
      );
      state.current = { type: "blank", answer: phrase.char, hint: phrase.word, misses: 0 };
      el.promptLabel.textContent = "選一個字，把語詞補完整";
      el.prompt.innerHTML = `請把「${blanked}」補完整`;
      el.prompt.className = "sentence";
      el.promptExtra.textContent = phrase.zh;
      renderAnswers(sample(choices, choices.length), item => item.char, item => item.char === phrase.char);
    }

    function showBubblePop() {
      state.bubbleLives = 3;
      state.bubbleMissed = [];
      state.timeLeft = 10;
      startBubbleTarget();
      el.timer.textContent = state.timeLeft;
      el.timerRow.hidden = false;
      el.bubbleArena.classList.add("show");
      state.timerId = setInterval(() => {
        state.timeLeft -= 1;
        el.timer.textContent = state.timeLeft;
        if (state.timeLeft <= 0) {
          endBubbleRound();
        }
      }, 1000);
      state.bubbleTargetTimer = setInterval(() => {
        missBubbleTarget("跳過");
        if (!state.locked) startBubbleTarget();
      }, 5000);
    }

    function resetBubbleTargetTimer() {
      clearInterval(state.bubbleTargetTimer);
      state.bubbleTargetTimer = setInterval(() => {
        missBubbleTarget("跳過");
        if (!state.locked) startBubbleTarget();
      }, 5000);
    }

    function startBubbleTarget() {
      clearInterval(state.bubbleId);
      el.bubbleArena.innerHTML = "";
      const target = state.words[Math.floor(Math.random() * state.words.length)];
      state.current = { type: "bubble", answer: target.char, hint: target.definition, misses: 0 };
      el.promptLabel.textContent = "快打指定的字";
      el.prompt.textContent = target.bopomofo;
      el.prompt.className = "meaning";
      el.promptExtra.textContent = `找：${target.definition}　生命：${"♥".repeat(state.bubbleLives)}`;
      spawnBubbles(target.char);
      state.bubbleId = setInterval(() => spawnBubbles(target.char), 650);
    }

    function missBubbleTarget(reason) {
      if (state.locked || !state.current?.answer) return;
      state.bubbleMissed.push(state.current.answer);
      state.bubbleLives -= 1;
      state.streak = 0;
      recordQuestion("wrong", 0);
      tickPet();
      updateUi();
      el.feedback.textContent = `${reason}：「${state.current.answer}」。剩 ${state.bubbleLives} 次機會。`;
      if (state.bubbleLives <= 0) endBubbleRound();
    }

    function endBubbleRound() {
      if (state.locked) return;
      state.locked = true;
      clearInterval(state.timerId);
      clearInterval(state.bubbleId);
      clearInterval(state.bubbleTargetTimer);
      state.timerId = null;
      state.bubbleId = null;
      state.bubbleTargetTimer = null;
      el.bubbleArena.innerHTML = "";
      const missed = [...new Set(state.bubbleMissed)].filter(char => DATA.entries[char]);
      if (missed.length) {
        showMissedReview(missed);
      } else {
        el.feedback.textContent = "時間到！這回合沒有漏掉的字。";
        setTimeout(() => {
          state.locked = false;
          showBubblePop();
        }, 1200);
      }
    }

    function showMissedReview(chars) {
      state.words = chars.map(char => ({ char, ...DATA.entries[char] }));
      state.reviewIndex = 0;
      state.missedReviewIndex = 0;
      el.reviewGate.hidden = false;
      document.querySelector(".question").hidden = true;
      el.answers.hidden = true;
      el.feedback.hidden = false;
      el.bubbleArena.classList.remove("show");
      el.bubbleArena.hidden = true;
      el.feedback.textContent = "先看漏掉的生字卡，看完就可以再玩一回合。";
      renderReviewCard();
      el.finishReview.disabled = state.words.length > 1;
      el.finishReview.textContent = "看完了，再玩一回合";
    }

    function spawnBubbles(targetChar) {
      const chars = sample(state.words, 5).map(item => item.char);
      if (!chars.includes(targetChar)) chars[Math.floor(Math.random() * chars.length)] = targetChar;
      chars.forEach(char => {
        const bubble = document.createElement("button");
        bubble.className = "bubble";
        bubble.textContent = char;
        bubble.style.left = `${Math.random() * 82 + 3}%`;
        bubble.style.animationDuration = `${Math.random() * 1.2 + 2.3}s`;
        bubble.addEventListener("click", () => {
          if (char === targetChar) {
            if (state.locked) return;
            state.locked = true;
            clearInterval(state.timerId);
            clearInterval(state.bubbleId);
            bubble.remove();
            rewardCorrect(1, "first");
            el.feedback.textContent = "打中了！賺到 1 元。";
            state.locked = false;
            resetBubbleTargetTimer();
            startBubbleTarget();
          } else {
            bubble.remove();
            missBubbleTarget(`不是「${char}」`);
            if (!state.locked) {
              resetBubbleTargetTimer();
              startBubbleTarget();
            }
          }
        });
        el.bubbleArena.append(bubble);
        setTimeout(() => bubble.remove(), 3600);
      });
    }

    function renderAnswers(choices, labelFor, isCorrect) {
      el.answers.innerHTML = "";
      choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "answer";
        button.textContent = labelFor(choice);
        button.addEventListener("click", () => answer(button, isCorrect(choice)));
        el.answers.append(button);
      });
    }

    function answer(button, correct) {
      if (state.locked) return;
      if (correct) {
        state.locked = true;
        const secondTry = state.current.misses > 0;
        const reward = secondTry ? .5 : 1;
        rewardCorrect(reward, secondTry ? "second" : "first");
        button.classList.add("correct");
        el.feedback.textContent = `答對了！賺到 ${formatMoney(reward)} 元。`;
        updateUi();
        setTimeout(pickQuestion, 900);
        return;
      }

      state.current.misses += 1;
      button.classList.add("wrong");
      button.disabled = true;
      if (state.current.misses === 1) {
        el.feedback.textContent = "再試一次，答對還可以賺 0.5 元。";
        return;
      }

      state.locked = true;
      state.streak = 0;
      recordQuestion("wrong", 0);
      tickPet();
      revealCorrectAnswer();
      updateUi();
      setTimeout(pickQuestion, 10000);
    }

    function revealCorrectAnswer() {
      const hint = state.current.hint ? `：${state.current.hint}` : "";
      el.feedback.textContent = `答案是「${state.current.answer}」${hint}。先看 10 秒，等一下再繼續。`;
      document.querySelectorAll(".answer").forEach(button => {
        if (button.textContent === state.current.answer || button.textContent === state.current.hint) {
          button.classList.add("correct");
        }
      });
    }

    function rewardCorrect(reward, result = "first") {
      state.streak += 1;
      state.coins = Math.round((state.coins + reward) * 10) / 10;
      recordQuestion(result, reward);
      addBadgeForProgress();
      tickPet();
      updateUi();
    }

    function tickPet() {
      state.inventory.ownedPets.forEach(pet => {
        const stats = state.petStats[pet] ||= { hunger: 55, happy: 55, clean: 55 };
        stats.hunger = Math.max(0, stats.hunger - 1);
        stats.happy = Math.max(0, stats.happy - 1);
        stats.clean = Math.max(0, stats.clean - 1);
      });
      state.stats = state.petStats[state.inventory.pet];
      saveProgress();
    }

    function buy(key) {
      const item = shop[key];
      if (!item) return;
      const permanent = item.category !== "food";
      const alreadyOwned = state.inventory.owned.includes(key) || state.inventory.pet === item.pet;
      if (alreadyOwned && permanent) {
        equipOwnedItem(item);
        return;
      }
      if (state.coins < item.price) return;
      state.coins = Math.round((state.coins - item.price) * 10) / 10;
      if (item.category === "food") {
        state.stats = state.petStats[state.inventory.pet] ||= { hunger: 55, happy: 55, clean: 55 };
        state.stats[item.stat] = Math.min(100, state.stats[item.stat] + item.amount);
        state.stats.happy = Math.min(100, state.stats.happy + 3);
      } else if (item.stat) {
        state.stats[item.stat] = Math.min(100, state.stats[item.stat] + item.amount);
      }
      if (item.accessory) {
        state.inventory.owned.push(key);
        state.inventory.accessories.push(key);
        equipOwnedItem(item);
        addBadge("有造型的小寵物");
      }
      if (item.pet) {
        state.inventory.owned.push(key);
        if (!state.inventory.ownedPets.includes(item.pet)) state.inventory.ownedPets.push(item.pet);
        state.petStats[item.pet] ||= { hunger: 55, happy: 55, clean: 55 };
        equipOwnedItem(item);
        addBadge("新寵物加入");
      }
      if (permanent && !state.inventory.owned.includes(key)) {
        state.inventory.owned.push(key);
      }
      addBadge(item.message.replace("！", ""));
      el.feedback.textContent = item.message;
      applyInventory();
      saveProgress();
      updateUi();
    }

    function equipOwnedItem(item) {
      if (item.pet) {
        state.inventory.pet = item.pet;
        state.petStats[item.pet] ||= { hunger: 55, happy: 55, clean: 55 };
        state.stats = state.petStats[item.pet];
      }
      if (item.accessory) {
        state.inventory.equipped[item.slot || "head"] = item.key;
      }
      applyInventory();
      saveProgress();
      updateUi();
    }

    function addBadgeForProgress() {
      if (state.streak === 3) addBadge("連續答對 3 題");
      if (state.streak === 5) addBadge("連續答對 5 題");
      if (state.coins >= 20) addBadge("存到 20 元");
    }

    function addBadge(text) {
      state.earnedBadges.add(text);
      renderBadges();
    }

    function renderBadges() {
      el.badges.innerHTML = "";
      state.earnedBadges.forEach(text => {
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = text;
        el.badges.append(badge);
      });
    }

    function applyInventory() {
      el.pet.className = "pet";
      if (state.inventory.pet && state.inventory.pet !== "dog") {
        el.pet.classList.add(`pet-${state.inventory.pet}`);
      }
      [
        ["head", el.accessoryHead],
        ["body", el.accessoryBody],
        ["feet", el.accessoryFeet],
        ["toy", el.accessoryToy]
      ].forEach(([slot, target]) => {
        const item = shop[state.inventory.equipped?.[slot]];
        target.textContent = item?.accessory ? (slot === "feet" ? `${item.accessory}${item.accessory}` : item.accessory) : "";
        target.classList.toggle("show", Boolean(item?.accessory));
      });
    }

    function renderShopTabs() {
      el.shopTabs.innerHTML = "";
      Object.entries(shopCategories).forEach(([key, group]) => {
        const button = document.createElement("button");
        button.className = "shop-tab";
        button.dataset.category = key;
        button.textContent = group.label;
        button.addEventListener("click", () => {
          state.shopCategory = key;
          renderShopTabs();
          renderShop();
        });
        el.shopTabs.append(button);
      });
    }

    function renderShop() {
      el.shop.innerHTML = "";
      const group = shopCategories[state.shopCategory] || shopCategories.pets;
      group.items.forEach(([key]) => {
        const item = shop[key];
        const button = document.createElement("button");
        button.className = "item";
        button.dataset.buy = key;
        button.innerHTML = `
          <span class="item-icon">${item.icon}</span>
          <span>${item.name}</span>
          <span class="price">${item.price} 元</span>
        `;
        button.addEventListener("click", () => buy(key));
        el.shop.append(button);
      });
      document.querySelectorAll(".shop-tab").forEach(button => {
        button.classList.toggle("active", button.dataset.category === state.shopCategory);
      });
      updateUi();
    }

    function renderParentDashboard() {
      const records = Object.entries(state.history).sort(([a], [b]) => b.localeCompare(a));
      const totals = records.reduce((sum, [, record]) => ({
        days: sum.days + (record.played > 0 ? 1 : 0),
        played: sum.played + record.played,
        correct: sum.correct + record.correct,
        coins: Math.round((sum.coins + record.coins) * 10) / 10
      }), { days: 0, played: 0, correct: 0, coins: 0 });
      const accuracy = totals.played ? Math.round(totals.correct / totals.played * 100) : 0;

      el.parentStats.innerHTML = `
        <div class="parent-stat"><strong>${totals.days}</strong><span>練習天數</span></div>
        <div class="parent-stat"><strong>${totals.played}</strong><span>完成題數</span></div>
        <div class="parent-stat"><strong>${accuracy}%</strong><span>答對率</span></div>
        <div class="parent-stat"><strong>${formatMoney(totals.coins)}</strong><span>累計賺元</span></div>
      `;

      el.historyList.innerHTML = "";
      records.slice(0, 10).forEach(([date, record]) => {
        const row = document.createElement("div");
        row.className = "history-row";
        const dayAccuracy = record.played ? Math.round(record.correct / record.played * 100) : 0;
        row.innerHTML = `
          <span>${date}</span>
          <span>${record.played} 題</span>
          <span>${dayAccuracy}%</span>
          <span>+${formatMoney(record.coins)} 元</span>
        `;
        el.historyList.append(row);
      });
    }

    function updateUi() {
      el.coins.textContent = formatMoney(state.coins);
      for (const key of Object.keys(state.stats)) {
        const value = state.stats[key];
        el[key].style.width = `${value}%`;
        el[`${key}Text`].textContent = value;
      }
      document.querySelectorAll(".item").forEach(button => {
        const item = shop[button.dataset.buy];
        const owned = state.inventory.owned.includes(button.dataset.buy) || state.inventory.pet === item.pet;
        const active = (item.pet && state.inventory.pet === item.pet) || (item.accessory && state.inventory.equipped[item.slot] === item.key);
        button.classList.toggle("owned", owned);
        button.classList.toggle("active", active);
        button.disabled = state.coins < item.price && !(owned && item.category !== "food");
      });
      renderParentDashboard();
    }

    document.querySelectorAll(".mode").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".mode").forEach(mode => mode.classList.remove("active"));
        button.classList.add("active");
        state.mode = button.dataset.mode;
        pickQuestion();
      });
    });

    document.querySelectorAll(".challenge-tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".challenge-tab").forEach(tab => tab.classList.remove("active"));
        button.classList.add("active");
        state.challengeType = button.dataset.challenge;
        if (document.body.dataset.view === "challenge") {
          buildChallengePools();
        }
      });
    });

    document.querySelectorAll(".view-tab").forEach(button => {
      button.addEventListener("click", () => {
        document.body.dataset.view = button.dataset.view;
        document.querySelectorAll(".view-tab").forEach(tab => tab.classList.remove("active"));
        button.classList.add("active");
        state.challengeMode = button.dataset.view === "challenge";
        if (state.challengeMode) {
          el.reviewGate.hidden = true;
          buildChallengePools();
        } else if (button.dataset.view === "practice") {
          buildPools();
        }
      });
    });

    el.prevCard.addEventListener("click", () => {
      state.reviewIndex = Math.max(0, state.reviewIndex - 1);
      renderReviewCard();
    });

    el.nextCard.addEventListener("click", () => {
      state.reviewIndex = Math.min(state.words.length - 1, state.reviewIndex + 1);
      renderReviewCard();
    });

    el.finishReview.addEventListener("click", () => {
      addBadge("看完生字卡");
      if (state.challengeMode && state.challengeType === "bubble") {
        buildChallengePools();
        return;
      }
      setPracticeLocked(false);
    });

    el.reloadDaily.addEventListener("click", () => {
      buildPools();
      pickQuestion();
    });

    el.practiceDate.addEventListener("change", () => {
      buildPools();
      addBadge("換日期練習");
      pickQuestion();
    });

    el.clearHistory.addEventListener("click", () => {
      state.coins = 0;
      state.stats = { hunger: 55, happy: 55, clean: 55 };
      state.inventory = { pet: "dog", accessories: [], equipped: {}, owned: [], ownedPets: ["dog"] };
      state.petStats = { dog: { hunger: 55, happy: 55, clean: 55 } };
      state.history = {};
      saveProgress();
      applyInventory();
      updateUi();
    });

    const scheduleDates = Object.keys(DATA.schedule).sort();
    el.practiceDate.min = scheduleDates[0];
    el.practiceDate.max = scheduleDates[scheduleDates.length - 1];
    document.body.dataset.view = "practice";
    loadProgress();
    buildPools();
    applyInventory();
    renderShopTabs();
    renderShop();
    renderBadges();
    updateUi();
  </script>
</body>
</html>
