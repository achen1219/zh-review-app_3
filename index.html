<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>小寵物中文練習店</title>
  <style>
    @font-face {
      font-family: 'ToneOZZhuyin';
      src: url('./fonts/ToneOZ-Zhuyin-Tsuipita-TC.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    :root {
      color-scheme: light;
      --ink:        #1f2933;
      --muted:      #64748b;
      --paper:      #f0fdf9;
      --panel:      #ffffff;
      --line:       #d9e2ec;
      --green:      #16a34a;
      --green-lt:   #dcfce7;
      --teal:       #177e89;
      --teal-dk:    #0e6b74;
      --teal-lt:    #ccfbf1;
      --gold:       #d97706;
      --gold-lt:    #fef3c7;
      --rose:       #e11d48;
      --rose-lt:    #ffe4e6;
      --blue:       #2563eb;
      --purple:     #7c3aed;
      --shadow:     0 10px 28px rgba(31,41,51,.13);
      --shadow-sm:  0 2px 8px  rgba(31,41,51,.08);
      --r:          14px;
      --r-sm:       10px;
    }

    * { box-sizing: border-box; }
    [hidden] { display: none !important; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, #ecfdf5 0%, #f0f9ff 50%, #fefce8 100%);
    }

    button, input, textarea, select { font: inherit; }
    button { border: 0; cursor: pointer; color: inherit; }

    /* ─── Layout ─────────────────────────────────────── */
    .app {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 20px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 18px 24px;
      background: linear-gradient(135deg, #ffffff, #f0fdf9);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.6rem);
      background: linear-gradient(135deg, var(--teal), var(--teal-dk));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: .95rem; }

    .coins {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: linear-gradient(135deg, var(--gold-lt), #fde68a);
      border: 2px solid var(--gold);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      font-weight: 800;
      font-size: 1.05rem;
      white-space: nowrap;
    }

    .coin {
      width: 34px; aspect-ratio: 1;
      display: grid; place-items: center;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fde68a, #f59e0b);
      color: #614700;
      border: 3px solid var(--gold);
      font-size: .9rem; font-weight: 900;
      box-shadow: 0 2px 6px rgba(217,119,6,.3);
    }

    main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }

    /* ─── View switching ──────────────────────────────── */
    body[data-view="practice"] .pet-panel,
    body[data-view="pet"] .practice,
    body[data-view="pet"] .history,
    body[data-view="challenge"] .pet-panel,
    body[data-view="challenge"] .daily-card,
    body[data-view="challenge"] .mode-row { display: none; }

    body[data-view="practice"] .challenge-tabs,
    body[data-view="pet"] .challenge-tabs { display: none; }

    /* ─── App tabs ────────────────────────────────────── */
    .app-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }

    .view-tab {
      min-height: 44px; padding: 10px 18px;
      border: 2px solid var(--line); border-radius: var(--r-sm);
      background: #f8fafc; font-weight: 800; transition: all .18s;
    }

    .view-tab:hover { border-color: var(--teal); }

    .view-tab.active {
      background: linear-gradient(135deg, var(--teal), var(--teal-dk));
      border-color: var(--teal-dk); color: #fff;
      box-shadow: 0 4px 12px rgba(23,126,137,.35);
    }

    /* ─── Sections ────────────────────────────────────── */
    section, aside {
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
    }

    /* ─── Practice section ────────────────────────────── */
    .practice { padding: 18px; }

    .review-gate {
      display: grid; gap: 12px; margin-bottom: 16px;
      padding: 16px; border: 2px solid var(--teal-lt);
      border-radius: var(--r); background: linear-gradient(135deg, #fff, var(--teal-lt));
    }

    .review-top {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; color: var(--muted); font-weight: 800;
    }

    .study-card {
      display: grid; grid-template-columns: 130px 1fr;
      gap: 18px; padding: 18px;
      border: 1px solid var(--line); border-radius: var(--r-sm);
      background: linear-gradient(135deg, #ffffff, #f6fbff);
    }

    .study-char {
      display: grid; place-items: center; min-height: 150px;
      border: 2px solid var(--teal-lt); border-radius: var(--r-sm);
      background: linear-gradient(135deg, #f8fafc, #e0f7fa);
      font-size: 5rem; font-weight: 900;
    }

    .zhuyin-text {
      font-family: 'ToneOZZhuyin',"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
    }

    .phrase-word {
      font-family: 'ToneOZZhuyin',"Microsoft JhengHei","PingFang TC","Noto Sans TC",system-ui,sans-serif;
      font-size: 1.18em; font-weight: 900; margin-right: 4px;
    }

    .study-fields { display: grid; gap: 8px; font-weight: 800; }
    .study-line span { color: var(--muted); margin-right: 6px; }
    .phrase-group { margin-top: 8px; }
    .phrase-group h3 { margin: 0 0 6px; font-size: 1rem; color: var(--blue); }
    .phrase-group ul { margin: 0; padding-left: 20px; }

    .review-actions { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }

    /* ─── Mode / challenge tabs ───────────────────────── */
    .mode-row, .challenge-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

    .mode, .challenge-tab, .shop-tab {
      min-height: 42px; padding: 8px 14px;
      border: 1.5px solid var(--line); border-radius: var(--r-sm);
      background: #f8fafc; font-weight: 700; transition: all .15s;
    }

    .mode:hover, .challenge-tab:hover { border-color: var(--teal); }

    .mode.active, .challenge-tab.active {
      background: linear-gradient(135deg, var(--teal-lt), #d4f4f0);
      border-color: var(--teal); color: var(--teal-dk); font-weight: 800;
    }

    /* ─── Question area ───────────────────────────────── */
    .question {
      min-height: 260px; display: grid; place-items: center; text-align: center;
      background: linear-gradient(135deg, #eff8f4, #fff8e8);
      border: 1.5px solid var(--line); border-radius: var(--r); padding: 24px;
      box-shadow: inset 0 2px 10px rgba(31,41,51,.05);
    }

    .prompt-label { color: var(--muted); margin-bottom: 10px; font-weight: 700; font-size: 1rem; }
    .big-char { font-size: clamp(4.4rem, 15vw, 8.5rem); line-height: 1; font-weight: 900; }
    .meaning  { margin-top: 12px; font-size: 1.3rem; color: var(--blue); font-weight: 800; }

    /* ─── Answers ─────────────────────────────────────── */
    .answers { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 14px; }

    .answer {
      min-height: 72px; padding: 12px; border-radius: var(--r-sm);
      border: 2px solid var(--line); background: #ffffff;
      font-size: clamp(1.05rem, 2.8vw, 1.4rem); font-weight: 800;
      transition: transform .14s, border-color .14s, background .14s, box-shadow .14s;
    }

    .answer:hover:not(:disabled) {
      transform: translateY(-3px); border-color: var(--teal);
      box-shadow: 0 6px 16px rgba(23,126,137,.18);
    }

    .answer.correct { background: var(--green-lt); border-color: var(--green); animation: correctPop .4s ease; }
    .answer.wrong   { background: var(--rose-lt);  border-color: var(--rose); }

    @keyframes correctPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.07); }
      100% { transform: scale(1); }
    }

    /* ─── Matching game ───────────────────────────────── */
    .match-arena {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }

    .match-col { display: flex; flex-direction: column; gap: 7px; }

    .match-chip {
      padding: 12px 8px; border-radius: var(--r-sm);
      border: 2px solid var(--line); background: #fff;
      font-weight: 800; font-size: 1rem;
      cursor: pointer; text-align: center;
      transition: all .15s; line-height: 1.3;
      min-height: 52px; display: grid; place-items: center;
    }

    .match-chip:hover:not(:disabled) { border-color: var(--teal); transform: translateY(-2px); }
    .match-chip.selected { border-color: var(--teal); background: var(--teal-lt); box-shadow: 0 0 0 3px rgba(23,126,137,.2); }
    .match-chip.matched  { border-color: var(--green); background: var(--green-lt); animation: matchPop .35s ease; opacity: .6; pointer-events: none; }
    .match-chip.wrong    { border-color: var(--rose);  background: var(--rose-lt);  animation: matchShake .35s ease; }

    @keyframes matchPop   { 0%,100% { transform: scale(1); } 45% { transform: scale(1.08); } }
    @keyframes matchShake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-7px); } 75% { transform: translateX(7px); } }

    .match-score {
      text-align: center; font-weight: 800; font-size: 1rem; color: var(--teal-dk);
      padding: 8px; background: var(--teal-lt); border-radius: var(--r-sm);
      margin-top: 8px;
    }

    /* ─── Feedback ────────────────────────────────────── */
    .feedback-wrap {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-top: 12px; min-height: 48px;
    }

    #feedback {
      flex: 1; min-height: 44px; padding: 10px 14px; border-radius: var(--r-sm);
      font-weight: 800; font-size: 1rem; color: var(--teal-dk);
      transition: background .2s, color .2s;
    }

    #feedback.fb-correct { background: var(--green-lt); color: var(--green); }
    #feedback.fb-wrong   { background: var(--rose-lt);  color: var(--rose); }

    #streakDisplay {
      white-space: nowrap; font-size: 1.5rem; font-weight: 900;
      min-width: 60px; text-align: center; display: inline-block;
    }

    #streakDisplay.pop { animation: streakPop .28s ease; }

    @keyframes streakPop {
      0%,100% { transform: scale(1); }
      45%     { transform: scale(1.55); }
    }

    /* ─── Daily goal strip ────────────────────────────── */
    .daily-goal-strip {
      margin-top: 10px; padding: 10px 14px; border-radius: var(--r-sm);
      background: linear-gradient(135deg, #f0fdf4, #dcfce7);
      border: 1.5px solid #86efac; font-weight: 800; font-size: .95rem; color: var(--green);
    }

    .goal-track { height: 10px; background: #d1fae5; border-radius: 999px; margin-top: 6px; overflow: hidden; }
    .goal-fill  { height: 100%; background: linear-gradient(90deg, #4ade80, #16a34a); border-radius: inherit; transition: width .4s ease; width: 0%; }

    /* ─── Timer ───────────────────────────────────────── */
    .timer-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; color: var(--muted); font-weight: 800; }

    .timer { min-width: 54px; padding: 5px 9px; border-radius: 999px; background: #fff; border: 2px solid var(--rose); color: var(--rose); font-weight: 900; }

    /* ─── Sentence / blank ────────────────────────────── */
    .sentence { font-size: clamp(1.7rem, 5vw, 3.6rem); line-height: 1.35; font-weight: 900; }
    .blank { display: inline-grid; place-items: center; min-width: 1.8em; margin: 0 4px; border-bottom: 6px solid var(--teal); color: transparent; }

    /* ─── Bubble arena ────────────────────────────────── */
    .bubble-arena {
      display: none; position: relative; min-height: 300px; margin-top: 14px;
      overflow: hidden; border: 1.5px solid var(--line); border-radius: var(--r);
      background: linear-gradient(180deg, #bae6fd 0%, #ecfdf5 60%, #fef9c3 100%);
    }

    .bubble-arena.show { display: block; }

    .bubble {
      position: absolute; width: 80px; aspect-ratio: 1; border-radius: 50%;
      border: 3px solid transparent;
      box-shadow: inset 0 -10px 18px rgba(0,0,0,.1), 0 8px 16px rgba(31,41,51,.12);
      display: grid; place-items: center;
      font-size: 2.1rem; font-weight: 900;
      animation: floatUp linear forwards; cursor: pointer; transition: transform .1s;
    }

    .bubble:hover { transform: scale(1.12) !important; }
    .bubble.burst { animation: bubbleBurst .25s ease forwards !important; pointer-events: none; }

    @keyframes floatUp   { from { transform: translateY(310px) scale(1); opacity: 1; } to { transform: translateY(-120px) scale(.9); opacity: .7; } }
    @keyframes bubbleBurst { 0% { transform: scale(1); opacity: 1; } 55% { transform: scale(1.7); opacity: .7; } 100% { transform: scale(0); opacity: 0; } }

    /* ─── Daily card ──────────────────────────────────── */
    .daily-card { margin-top: 16px; padding: 14px; border: 1.5px solid var(--line); border-radius: var(--r-sm); background: #ffffff; }

    .daily-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; color: var(--muted); font-weight: 800; }

    .date-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    .date-input { min-height: 38px; border: 1.5px solid var(--line); border-radius: var(--r-sm); padding: 7px 9px; background: #fff; color: var(--ink); font-weight: 800; }

    .word-chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .word-chip { padding: 7px 10px; border-radius: var(--r-sm); background: linear-gradient(135deg, #f8fafc, #e0f7fa); border: 1px solid var(--teal-lt); font-weight: 900; font-size: 1.1rem; }

    /* ─── Buttons ─────────────────────────────────────── */
    .small-button {
      min-height: 38px; padding: 8px 14px; border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--ink), #374151); color: white;
      font-weight: 800; white-space: nowrap; transition: transform .13s, box-shadow .13s;
    }

    .small-button:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(31,41,51,.25); }

    /* ─── Pet panel ───────────────────────────────────── */
    .pet-panel { overflow: hidden; max-width: 980px; margin: 0 auto; width: 100%; }

    /* ─── Yard ────────────────────────────────────────── */
    .yard { min-height: 340px; position: relative; overflow: hidden; display: grid; place-items: center; }

    .yard-sky   { position: absolute; inset: 0 0 42% 0; background: linear-gradient(180deg, #7dd3fc, #bae6fd 70%, #d4f0ff); }
    .yard-ground{ position: absolute; inset: 58% 0 0 0; background: linear-gradient(180deg, #4ade80 0%, #22c55e 18%, #c9a66b 18%); }

    .sun {
      position: absolute; top: 16px; right: 50px; width: 52px; height: 52px;
      background: radial-gradient(circle at 38% 38%, #fef08a, #fbbf24);
      border-radius: 50%; animation: sunPulse 4s ease-in-out infinite; z-index: 1;
      box-shadow: 0 0 0 10px rgba(251,191,36,.18), 0 0 30px rgba(251,191,36,.4);
    }

    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 0 10px rgba(251,191,36,.18), 0 0 30px rgba(251,191,36,.4); }
      50%     { box-shadow: 0 0 0 16px rgba(251,191,36,.25), 0 0 50px rgba(251,191,36,.55); }
    }

    .cloud { position: absolute; z-index: 1; pointer-events: none; }
    .cloud-shape { background: rgba(255,255,255,.85); border-radius: 50px; position: relative; }

    @keyframes cloudDrift1 { from { transform: translateX(-220px); } to { transform: translateX(calc(100vw + 220px)); } }
    @keyframes cloudDrift2 { from { transform: translateX(calc(100vw + 220px)); } to { transform: translateX(-220px); } }

    /* ─── Emoji pet (large emoji + absolute accessories) ─ */
    .pet {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
      transform-origin: bottom center;
      animation: bounce 2.3s ease-in-out infinite;
      filter: drop-shadow(0 12px 18px rgba(31,41,51,.25));
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0) rotate(-1deg); }
      50%     { transform: translateY(-12px) rotate(1deg); }
    }

    /* Figure: a relative container so accessories can be absolute */
    .pet-figure {
      position: relative;
      display: inline-block;
      line-height: 1;
    }

    /* The main emoji — big and clear */
    .pet-emoji {
      font-size: 9rem;
      line-height: 1;
      display: block;
      user-select: none;
    }

    /* All accessories: absolutely positioned over the emoji */
    .pet-acc {
      position: absolute;
      pointer-events: none;
      user-select: none;
      line-height: 1;
      text-align: center;
    }

    /* Hat/crown: floats just above the top of the emoji */
    .pet-acc-head {
      top: -0.45em;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.6rem;
      white-space: nowrap;
    }

    /* Clothes: centred in the lower-middle area of the emoji (body zone) */
    .pet-acc-body {
      bottom: 0.05em;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.4rem;
      white-space: nowrap;
    }

    /* Shoes: just below the bottom of the emoji */
    .pet-acc-feet {
      bottom: -1.3em;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.9rem;
      letter-spacing: 4px;
      white-space: nowrap;
    }

    /* Toy: held to the right side of the emoji */
    .pet-acc-toy {
      right: -1.4em;
      top: 30%;
      font-size: 2.6rem;
    }

    /* Mood: below the whole figure (needs extra top margin for feet) */
    .pet-mood {
      font-size: 1.8rem;
      line-height: 1;
      margin-top: 1.6em;
      user-select: none;
    }

    /* ─── Stats ───────────────────────────────────────── */
    .stats { padding: 14px; display: grid; gap: 12px; }

    .stat { display: grid; grid-template-columns: 82px 1fr 48px 22px; gap: 9px; align-items: center; font-weight: 800; }

    .bar { height: 16px; overflow: hidden; border-radius: 999px; background: #edf2f7; border: 1px solid var(--line); }

    .fill { height: 100%; border-radius: inherit; transition: width .35s ease, background .5s; }
    .fill.high { background: linear-gradient(90deg, #4ade80, #16a34a); }
    .fill.mid  { background: linear-gradient(90deg, #fbbf24, #d97706); }
    .fill.low  { background: linear-gradient(90deg, #f87171, #e11d48); }

    .stat-emoji { text-align: center; font-size: 1rem; }

    /* ─── Shop ────────────────────────────────────────── */
    .shop-title { padding: 14px 14px 8px; margin: 0; font-size: 1.2rem; border-top: 1px solid var(--line); }

    .shop-tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 14px 12px; }

    .shop-tab.active { background: linear-gradient(135deg, var(--teal-lt), #d4f4f0); border-color: var(--teal); color: var(--teal-dk); font-weight: 800; }

    .shop { padding: 0 14px 14px; display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 10px; }

    .item {
      position: relative; min-height: 90px; border-radius: var(--r-sm);
      border: 2px solid var(--line); background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; padding: 10px 8px; font-weight: 800;
      transition: transform .14s, box-shadow .14s, border-color .14s; cursor: pointer;
    }

    .item:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(31,41,51,.14); border-color: var(--teal); }
    .item:disabled { opacity: .55; cursor: not-allowed; }

    .item-need { font-size: .72rem; color: var(--rose); font-weight: 700; }

    .item.owned { border-color: var(--green); background: var(--green-lt); }

    .item.owned::after { content: '✓'; position: absolute; top: 5px; right: 8px; font-size: .75rem; color: var(--green); font-weight: 900; }

    .item.active { border-color: var(--teal); background: linear-gradient(135deg, var(--teal-lt), #d4f4f0); box-shadow: 0 0 0 3px rgba(23,126,137,.2); }

    .item-icon { font-size: 2rem; line-height: 1; }
    .price { color: var(--gold); font-size: .88rem; }
    .item-boost { font-size: .78rem; color: var(--teal); font-weight: 700; }

    /* ─── Shop earn-coins banner ─────────────────────── */
    .shop-banner {
      margin: 0 14px 12px; padding: 12px 16px; border-radius: var(--r-sm);
      background: linear-gradient(135deg, var(--gold-lt), #fde68a);
      border: 1.5px solid var(--gold); font-size: .95rem; font-weight: 700; color: #7c4700;
      display: flex; align-items: center; gap: 10px;
    }

    /* ─── Missed card overlay ─────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 1000; display: grid; place-items: center; padding: 16px;
    }

    .modal-box {
      background: white; border-radius: var(--r); padding: 20px;
      max-width: 540px; width: 100%;
      box-shadow: 0 24px 60px rgba(0,0,0,.4);
    }

    .missed-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 14px; font-weight: 800; font-size: 1.05rem; color: var(--rose);
    }

    .countdown-ring {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--rose-lt); border: 3px solid var(--rose);
      display: grid; place-items: center;
      font-weight: 900; font-size: 1.25rem; color: var(--rose); flex-shrink: 0;
    }

    .modal-timer-track { margin-top: 12px; height: 8px; background: #edf2f7; border-radius: 999px; overflow: hidden; }
    .modal-timer-fill  { height: 100%; background: linear-gradient(90deg, var(--rose), #f97316); border-radius: inherit; width: 100%; }

    /* ─── Penalty overlay ─────────────────────────────── */
    .penalty-box { text-align: center; max-width: 380px; }
    .penalty-icon-big { font-size: 5rem; line-height: 1; margin-bottom: 16px; }
    .penalty-text { font-size: 1.1rem; font-weight: 800; line-height: 1.7; margin-bottom: 20px; color: var(--rose); }

    /* ─── History / parent section ────────────────────── */
    .history { margin-top: 18px; padding: 14px; display: grid; gap: 8px; grid-column: 1 / -1; }
    .history h2 { margin: 0; font-size: 1.15rem; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; }

    .badge { padding: 7px 12px; border-radius: 999px; background: linear-gradient(135deg, #e0f2fe, #dbeafe); color: #1e40af; font-weight: 800; border: 1px solid #bfdbfe; font-size: .9rem; }

    .parent-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; }

    .parent-stat { padding: 12px; border: 1px solid var(--line); border-radius: var(--r-sm); background: linear-gradient(135deg, #fff, #f8fafc); }
    .parent-stat strong { display: block; font-size: 1.3rem; margin-bottom: 2px; color: var(--teal-dk); }

    .history-list { display: grid; gap: 7px; }

    .history-row { display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; align-items: center; padding: 9px 12px; border: 1px solid var(--line); border-radius: var(--r-sm); background: #fff; font-weight: 800; }

    /* ─── Confetti ────────────────────────────────────── */
    .confetti-piece {
      position: fixed; width: 11px; height: 11px; border-radius: 2px;
      pointer-events: none; z-index: 9999; animation: confettiFall ease-in forwards;
    }

    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg) translateX(0); }
      100% { opacity: 0; transform: translateY(90vh) rotate(720deg) translateX(var(--drift)); }
    }

    /* ─── Responsive ──────────────────────────────────── */
    @media (max-width: 840px) {
      header { flex-direction: column; align-items: flex-start; }
      main { grid-template-columns: 1fr; }
      .answers, .shop { grid-template-columns: 1fr 1fr; }
      .study-card { grid-template-columns: 1fr; }
      .parent-grid { grid-template-columns: 1fr 1fr; }
      .history-row { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 480px) {
      .answers { grid-template-columns: 1fr; }
      .shop { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .pet-emoji { font-size: 7rem; }
    }
  </style>
</head>

    const shop = {};

    Object.entries(shopCategories).forEach(([cat, group]) => {
      group.items.forEach(([key, icon, name, price]) => {
        const consumable = cat === "food" || cat === "bath";

          : headItems.has(key) ? "head"

    function confettiBurst(originX, originY) {
      for (let i = 0; i < 32; i++) {
        const piece = document.createElement("div");
        piece.className = "confetti-piece";
        const color = confettiColors[Math.floor(Math.random() * confettiColors.length)];
        const drift = (Math.random() - .5) * 280;
        const dur   = 700 + Math.random() * 600;
        const size  = 8 + Math.random() * 8;
        piece.style.cssText = `left:${originX}px;top:${originY}px;width:${size}px;height:${size}px;background:${color};--drift:${drift}px;animation-duration:${dur}ms;border-radius:${Math.random()>.5?"50%":"2px"};`;
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), dur + 50);
      }
    }

    /* ── Streak display ───────────────────────────────── */

      if (state.streak <= 0) { el.streakDisplay.textContent = ""; return; }
      const prev = el.streakDisplay.textContent;
      el.streakDisplay.textContent = `🔥 ${state.streak}`;
      if (prev !== el.streakDisplay.textContent) {
        el.streakDisplay.classList.remove("pop");
        void el.streakDisplay.offsetWidth;
        el.streakDisplay.classList.add("pop");
      }
    }

    /* ── Pet expression ───────────────────────────────── */
    function updatePetExpression() {
      const avg = (state.stats.hunger + state.stats.happy + state.stats.clean) / 3;
      el.petMood.textContent = avg >= 70 ? "😊" : avg >= 40 ? "😐" : "😢";
    }

    /* ── Stat bars ────────────────────────────────────── */
    function updateStatBars() {
      [["hunger","hungerText","hungerEmoji"],
       ["happy","happyText","happyEmoji"],
       ["clean","cleanText","cleanEmoji"]
      ].forEach(([key, textId, emojiId]) => {
        const value = state.stats[key] ?? 0;
        el[key].style.width = `${value}%`;
        el[textId].textContent = value;
        el[key].classList.remove("high","mid","low");
        if (value >= 60) el[key].classList.add("high");
        else if (value >= 30) el[key].classList.add("mid");
        else el[key].classList.add("low");
        el[emojiId].textContent = value >= 70 ? "🌟" : value >= 30 ? "" : "⚠️";
      });
    }

    /* ── Daily goal ────────────────────────────────────── */
    function updateDailyGoal() {
      const daily = (state.history[todayKey()] || {}).daily || 0;
      el.dailyGoalCount.textContent = daily;
      el.dailyGoalFill.style.width  = `${Math.min(100, daily / 30 * 100)}%`;
    }

    /* ── Helpers ──────────────────────────────────────── */
    function todayKey() {
      const now = new Date();
      return new Date(now.getTime() - now.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
    }

    function getYesterdayKey() {
      const now = new Date();
      const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000);
      local.setDate(local.getDate() - 1);
      return local.toISOString().slice(0, 10);
    }

    function formatMoney(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    /* ── Persistence ──────────────────────────────────── */
    function loadProgress() {
      try {
        const saved = JSON.parse(localStorage.getItem("zhPetReviewProgress") || "{}");
        state.coins     = saved.coins ?? state.coins;
        state.stats     = saved.stats  || state.stats;
        state.inventory = saved.inventory || state.inventory;
        state.inventory.accessories ||= [];
        state.inventory.equipped    ||= {};
        state.inventory.owned       ||= [];
        state.inventory.ownedPets   ||= [state.inventory.pet || "dog"];
        if (!state.inventory.ownedPets.includes("dog")) state.inventory.ownedPets.unshift("dog");
        if (!state.inventory.owned.includes("dog"))     state.inventory.owned.unshift("dog");
        state.petStats = saved.petStats || { [state.inventory.pet || "dog"]: saved.stats || state.stats };
        state.inventory.ownedPets.forEach(p => { state.petStats[p] ||= { hunger:55, happy:55, clean:55 }; });
        state.stats   = state.petStats[state.inventory.pet] || state.stats;
        state.history = saved.history || {};
      } catch { state.history = {}; }
    }

    function saveProgress() {
      localStorage.setItem("zhPetReviewProgress", JSON.stringify({
        coins: state.coins, stats: state.stats,
        petStats: state.petStats, inventory: state.inventory, history: state.history
      }));
    }

    function dayRecord(date = state.activeDate || todayKey()) {
      state.history[date] ||= { played:0, correct:0, firstTry:0, secondTry:0, wrong:0, coins:0, daily:0 };
      return state.history[date];
    }

    function recordQuestion(result, reward = 0) {
      const record = dayRecord();
      record.played += 1;
      if (!state.challengeMode) record.daily = (record.daily || 0) + 1;
      record.coins = Math.round((record.coins + reward) * 10) / 10;
      if (result === "first")       { record.correct += 1; record.firstTry  += 1; }
      else if (result === "second") { record.correct += 1; record.secondTry += 1; }
      else                          { record.wrong += 1; }
      saveProgress();
      renderParentDashboard();
      updateDailyGoal();
    }

    /* ── Daily enforcement ────────────────────────────── */
    function checkDailyEnforcement() {
      const yesterday = getYesterdayKey();
      const rec = state.history[yesterday];
      if (!rec || rec.penaltyApplied) return;
      rec.penaltyApplied = true;
      const daily = rec.daily || 0;
      if (daily >= 30) { saveProgress(); return; }
      const nonDog = state.inventory.ownedPets.filter(p => p !== "dog");
      if (nonDog.length === 0) { saveProgress(); showWarningNotification(daily); return; }
      const petKey = nonDog[nonDog.length - 1];
      state.inventory.ownedPets = state.inventory.ownedPets.filter(p => p !== petKey);
      state.inventory.owned     = state.inventory.owned.filter(k => k !== petKey);
      delete state.petStats[petKey];
      if (state.inventory.pet === petKey) {
        state.inventory.pet = "dog";
        state.stats = state.petStats["dog"] ||= { hunger:55, happy:55, clean:55 };
      }
      saveProgress();
      applyInventory();
      const petName = shopCategories.pets.items.find(([k]) => k === petKey)?.[2] || petKey;
      showPenaltyNotification(petEmojis[petKey] || "🐾", petName, daily);
    }

    function showPenaltyNotification(icon, petName, daily) {
      el.penaltyIconBig.textContent = icon;
      el.penaltyText.innerHTML =
        `昨天只完成了 <strong>${daily}</strong> 題每日練習，<br>沒有達到 30 題的目標！<br><br>` +
        `所以「${petName}」${icon} 離家出走了... 😢<br><br>今天要認真完成 30 題喔！`;
      el.penaltyOverlay.hidden = false;
    }

    function showWarningNotification(daily) {
      el.penaltyIconBig.textContent = "⚠️";
      el.penaltyText.innerHTML =
        `昨天只完成了 <strong>${daily}</strong> 題每日練習，<br>沒有達到 30 題的目標！<br><br>` +
        `雖然目前沒有其他寵物，但要加油！<br>今天要認真完成 30 題喔！`;
      el.penaltyOverlay.hidden = false;
    }

    /* ── Missed card sequence ─────────────────────────── */
    let _missedCards = [], _missedIdx = 0, _missedCdId = null, _missedOnDone = null;

    function showMissedCardSequence(chars, onDone) {
      _missedCards  = chars.filter(c => DATA && DATA.entries[c]);
      _missedIdx    = 0;
      _missedOnDone = onDone;
      if (_missedCards.length === 0) { if (onDone) onDone(); return; }
      showNextMissedCard();
    }

    function showNextMissedCard() {
      clearInterval(_missedCdId);
      if (_missedIdx >= _missedCards.length) {
        el.missedOverlay.hidden = true;
        if (_missedOnDone) _missedOnDone();
        return;
      }
      const char  = _missedCards[_missedIdx];
      const entry = DATA.entries[char];
      el.missedProgress.textContent = `${_missedIdx + 1} / ${_missedCards.length}`;
      el.missedChar.textContent     = char;
      el.missedBopomofo.textContent = entry.bopomofo   || "";
      el.missedRadical.textContent  = entry.radical    || "";
      el.missedDef.textContent      = entry.definition || "";
      const groups = {};
      (entry.phrases || []).forEach(p => {
        const len = Math.min([...p.word].length, 4);
        groups[len] ||= [];
        groups[len].push(p);
      });
      el.missedPhrases.innerHTML = "";
      Object.keys(groups).sort((a,b) => Number(a)-Number(b)).slice(0,2).forEach(len => {
        const grp = document.createElement("div");
        grp.className = "phrase-group";
        grp.innerHTML = `<h3>常用詞（${len}字）</h3>`;
        const list = document.createElement("ul");
        groups[len].slice(0,2).forEach(p => {
          const li = document.createElement("li");
          li.className = "zhuyin-text";
          li.innerHTML = `<span class="phrase-word">${p.word}</span>：${p.zh}`;
          list.append(li);
        });
        grp.append(list);
        el.missedPhrases.append(grp);
      });
      el.missedOverlay.hidden = false;
      el.missedTimerBar.style.transition = "none";
      el.missedTimerBar.style.width = "100%";
      requestAnimationFrame(() => requestAnimationFrame(() => {
        el.missedTimerBar.style.transition = "width 10s linear";
        el.missedTimerBar.style.width = "0%";
      }));
      let t = 10;
      el.missedCountdown.textContent = t;
      _missedCdId = setInterval(() => {
        t--;
        el.missedCountdown.textContent = t;
        if (t <= 0) { clearInterval(_missedCdId); _missedIdx++; showNextMissedCard(); }
      }, 1000);
    }

    /* ── Schedule / pools ─────────────────────────────── */
    function activeScheduleDate() {
      if (el.practiceDate?.value && DATA.schedule[el.practiceDate.value]) return el.practiceDate.value;
      const dates = Object.keys(DATA.schedule).sort();
      const today = todayKey();
      if (DATA.schedule[today]?.length) return today;
      const previous = dates.filter(d => d <= today && DATA.schedule[d]?.length).pop();
      return previous || dates.find(d => DATA.schedule[d]?.length) || dates[0];
    }

    function buildPools() {
      const date = activeScheduleDate();
      state.activeDate = date;
      el.practiceDate.value = date;
      state.reviewIndex    = 0;
      state.reviewComplete = false;
      el.finishReview.textContent = "我看完了，開始遊戲";
      const chars = [...new Set(DATA.schedule[date] || [])].filter(c => DATA.entries[c]);
      state.words = chars.map(c => ({ char:c, ...DATA.entries[c] }));
      state.phrasePool = state.words.flatMap(item =>
        (item.phrases || []).map(p => ({ ...p, char:item.char, bopomofo:item.bopomofo }))
      ).filter(p => p.word.length >= 2 && p.zh.length >= 4);
      el.dailyTitle.textContent = `${date} 複習`;
      el.dailyWords.innerHTML = "";
      state.words.forEach(item => {
        const chip = document.createElement("span");
        chip.className = "word-chip";
        chip.textContent = `${item.char} ${item.bopomofo}`;
        el.dailyWords.append(chip);
      });
      renderReviewCard();
      setPracticeLocked(true);
    }

    function buildChallengePools() {
      const today = todayKey();
      const chars = [...new Set(Object.entries(DATA.schedule)
        .filter(([d]) => d <= today).flatMap(([,list]) => list || []))]
        .filter(c => DATA.entries[c]);
      state.words = chars.map(c => ({ char:c, ...DATA.entries[c] }));
      state.phrasePool = state.words.flatMap(item =>
        (item.phrases || []).map(p => ({ ...p, char:item.char, bopomofo:item.bopomofo }))
      ).filter(p => p.word.length >= 2 && p.zh.length >= 4);
      if (state.words.length < 4) state.words = Object.entries(DATA.entries).slice(0,80).map(([c,e]) => ({char:c,...e}));
      if (state.phrasePool.length < 4) {
        state.phrasePool = Object.entries(DATA.entries).flatMap(([c,e]) =>
          (e.phrases||[]).map(p=>({...p,char:c,bopomofo:e.bopomofo}))
        ).filter(p=>p.word.length>=2&&p.zh.length>=4).slice(0,120);
      }
      state.reviewComplete = true;
      el.reviewGate.hidden = true;
      document.querySelector(".question").hidden = false;
      el.answers.hidden = false;
      el.feedback.hidden = false;
      el.bubbleArena.hidden = false;
      pickQuestion();
    }

    function setPracticeLocked(locked) {
      state.reviewComplete = !locked;
      document.querySelector(".mode-row").hidden = true;
      document.querySelector(".question").hidden = locked;
      el.answers.hidden    = locked;
      el.feedback.hidden   = locked;
      el.bubbleArena.hidden = locked;
      el.reviewGate.hidden  = !locked;
      if (!locked) pickQuestion();
    }

    /* ── Review card ──────────────────────────────────── */
    function renderReviewCard() {
      const item = state.words[state.reviewIndex] || state.words[0];
      if (!item) return;
      el.reviewProgress.textContent   = `生字卡 ${state.reviewIndex + 1} / ${state.words.length}`;
      el.studyChar.textContent         = item.char;
      el.studyBopomofo.textContent     = item.bopomofo   || "";
      el.studyRadical.textContent      = item.radical    || "";
      el.studyDefinition.textContent   = item.definition || "";
      const groups = {};
      (item.phrases || []).forEach(p => {
        const len = Math.min([...p.word].length, 4);
        groups[len] ||= [];
        groups[len].push(p);
      });
      el.studyPhrases.innerHTML = "";
      Object.keys(groups).sort((a,b) => Number(a)-Number(b)).forEach(len => {
        const group = document.createElement("div");
        group.className = "phrase-group";
        group.innerHTML = `<h3>常用詞（${len}字）</h3>`;
        const list = document.createElement("ul");
        groups[len].slice(0,3).forEach(p => {
          const li = document.createElement("li");
          li.className = "zhuyin-text";
          li.innerHTML = `<span class="phrase-word">${p.word}</span>：${p.zh}`;
          list.append(li);
        });
        group.append(list);
        el.studyPhrases.append(group);
      });
      el.prevCard.disabled  = state.reviewIndex === 0;
      el.nextCard.textContent = state.reviewIndex === state.words.length - 1 ? "最後一張" : "下一張";
      el.nextCard.disabled    = state.reviewIndex === state.words.length - 1;
      el.finishReview.disabled = state.reviewIndex !== state.words.length - 1;
    }

    function sample(list, count) {
      return [...list].sort(() => Math.random() - .5).slice(0, count);
    }

    /* ── Guaranteed distractors ───────────────────────── */
    function getDistractors(pool, excludeItem, labelKey, count = 3) {
      let others = pool.filter(i => i[labelKey] !== excludeItem[labelKey]);
      if (others.length < count) {
        const extra = Object.entries(DATA.entries)
          .filter(([c]) => !pool.find(w => w.char === c) && c !== excludeItem.char)
          .slice(0, count - others.length)
          .map(([c,e]) => ({ char:c, ...e }));
        others = [...others, ...extra];
      }
      return sample(others, count);
    }

    /* ── Round reset ──────────────────────────────────── */
    function resetRoundUi() {
      state.locked = false;
      clearInterval(state.timerId);
      clearInterval(state.bubbleId);
      clearInterval(state.bubbleTargetTimer);
      state.timerId = state.bubbleId = state.bubbleTargetTimer = null;
      el.feedback.textContent  = "";
      el.feedback.className    = "feedback";
      el.answers.innerHTML     = "";
      el.bubbleArena.innerHTML = "";
      el.bubbleArena.classList.remove("show");
      el.timerRow.hidden  = true;
      el.matchArena.hidden = true;
      el.matchScore.hidden = true;
      _matchSelectedChip = null;
      _matchSelectedChar = null;
      _matchSelectedSide = null;
    }

    /* ── Question picker ──────────────────────────────── */
    function pickQuestion() {
      if (!state.reviewComplete && !state.challengeMode) return;
      resetRoundUi();
      if (state.challengeMode && state.challengeType === "bubble") return showBubblePop();
      if (state.challengeMode && state.challengeType === "match")  return showMatchingGame();
      // Daily practice + 快問快答 challenge: random mode (matching included occasionally)
      const modes = ["charMeaning","phraseMeaning","sentenceBlank"];
      if (state.words.length >= 4) modes.push("match");
      state.mode = sample(modes, 1)[0];
      if (state.mode === "match")         return showMatchingGame();
      if (state.mode === "charMeaning")   return showCharMeaning();
      if (state.mode === "phraseMeaning") return showPhraseMeaning();
      showSentenceBlank();
    }

    /* ── Game modes ───────────────────────────────────── */
    function showCharMeaning() {
      const word = state.words[Math.floor(Math.random() * state.words.length)];
      const choices = sample([...getDistractors(state.words, word, "char"), word], 4);
      state.current = { type:"char", answer:word.char, answerChar:word.char, hint:word.definition, misses:0 };
      el.promptLabel.textContent = "這個字是什麼意思？";
      el.prompt.textContent      = word.char;
      el.prompt.className        = "big-char";
      el.promptExtra.textContent = word.bopomofo;
      renderAnswers(choices, i => i.definition, i => i.char === word.char);
    }

    function showPhraseMeaning() {
      if (state.phrasePool.length === 0) return showCharMeaning();
      const phrase = state.phrasePool[Math.floor(Math.random() * state.phrasePool.length)];
      const choices = sample([...getDistractors(state.phrasePool, phrase, "word"), phrase], 4);
      state.current = { type:"phrase", answer:phrase.word, answerChar:phrase.char, hint:phrase.zh, misses:0 };
      el.promptLabel.textContent = "這個語詞是什麼意思？";
      el.prompt.textContent      = phrase.word;
      el.prompt.className        = "sentence";
      el.promptExtra.textContent = phrase.bopomofo;
      renderAnswers(choices, i => i.zh, i => i.word === phrase.word);
    }

    function showSentenceBlank() {
      if (state.phrasePool.length === 0) return showCharMeaning();
      const usable  = state.phrasePool.filter(i => [...i.word].includes(i.char));
      const phrase  = usable.length ? usable[Math.floor(Math.random() * usable.length)] : state.phrasePool[0];
      const blanked = phrase.word.replace(phrase.char, "＿");
      const target  = state.words.find(i => i.char === phrase.char) || { char:phrase.char, ...DATA.entries[phrase.char] };
      const choices = sample([...getDistractors(state.words, {char:phrase.char}, "char"), target], 4);
      state.current = { type:"blank", answer:phrase.char, answerChar:phrase.char, hint:phrase.word, misses:0 };
      el.promptLabel.textContent = "選一個字，把語詞補完整";
      el.prompt.innerHTML        = `請把「${blanked}」補完整`;
      el.prompt.className        = "sentence";
      el.promptExtra.textContent = phrase.zh;
      renderAnswers(choices, i => i.char, i => i.char === phrase.char);
    }

    /* ── Matching game ────────────────────────────────── */
    let _matchSelectedChip = null, _matchSelectedChar = null, _matchSelectedSide = null;

    function showMatchingGame() {
      const pairs = sample(state.words, Math.min(6, state.words.length));
      if (pairs.length < 2) return showCharMeaning();

      el.matchArena.hidden = false;
      el.matchScore.hidden = false;
      el.answers.innerHTML = "";
      el.timerRow.hidden   = true;
      el.promptLabel.textContent = "把字和意思配對！";
      el.prompt.textContent      = "";
      el.promptExtra.textContent = "";

      _matchSelectedChip = null;
      _matchSelectedChar = null;
      _matchSelectedSide = null;

      const leftItems  = sample(pairs, pairs.length);
      const rightItems = sample(pairs, pairs.length);

      let remaining = pairs.length;
      let wrong     = 0;

      el.matchScore.textContent = `已配對：0 / ${pairs.length} 對`;

      function updateScore(matched) {
        el.matchScore.textContent = `已配對：${matched} / ${pairs.length} 對`;
      }

      function tryMatch(aChip, aChar, aSide, bChip, bChar) {
        if (aChar === bChar) {
          aChip.classList.remove("selected"); aChip.classList.add("matched");
          bChip.classList.remove("selected"); bChip.classList.add("matched");
          _matchSelectedChip = null; _matchSelectedChar = null; _matchSelectedSide = null;
          remaining--;
          const matched = pairs.length - remaining;
          updateScore(matched);
          rewardCorrect(0.5, "first");
          if (remaining === 0) {
            const msg = wrong === 0 ? "全部配對成功！完美！🎉" : `完成！配對了 ${pairs.length} 對。`;
            setFeedback(msg, "correct");
            const midX = window.innerWidth / 2, midY = window.innerHeight / 3;
            confettiBurst(midX, midY);
            setTimeout(() => { addBadge("配對遊戲 🃏"); showMatchingGame(); }, 1200);
          }
        } else {
          wrong++;
          aChip.classList.remove("selected"); aChip.classList.add("wrong");
          bChip.classList.add("wrong");
          _matchSelectedChip = null; _matchSelectedChar = null; _matchSelectedSide = null;
          state.streak = 0;
          recordQuestion("wrong", 0);
          tickPet();
          updateUi();
          setTimeout(() => {
            aChip.classList.remove("wrong");
            bChip.classList.remove("wrong");
          }, 500);
        }
      }

      function makeChip(item, side) {
        const chip = document.createElement("button");
        chip.className = "match-chip";
        chip.textContent = side === "left" ? item.char : item.definition;
        chip.dataset.char = item.char;
        chip.addEventListener("click", () => {
          if (chip.classList.contains("matched") || chip.classList.contains("wrong")) return;
          if (!_matchSelectedChip) {
            // First selection
            chip.classList.add("selected");
            _matchSelectedChip = chip;
            _matchSelectedChar = item.char;
            _matchSelectedSide = side;
          } else if (_matchSelectedSide === side) {
            // Same side: change selection
            _matchSelectedChip.classList.remove("selected");
            chip.classList.add("selected");
            _matchSelectedChip = chip;
            _matchSelectedChar = item.char;
            _matchSelectedSide = side;
          } else {
            // Different side: attempt match
            const savedChip = _matchSelectedChip;
            const savedChar = _matchSelectedChar;
            const savedSide = _matchSelectedSide;
            _matchSelectedChip = null; _matchSelectedChar = null; _matchSelectedSide = null;
            if (savedSide === "left") tryMatch(savedChip, savedChar, "left", chip, item.char);
            else                      tryMatch(chip, item.char, "left", savedChip, savedChar);
          }
        });
        return chip;
      }

      el.matchLeft.innerHTML  = "";
      el.matchRight.innerHTML = "";
      leftItems.forEach(item => el.matchLeft.append(makeChip(item, "left")));
      rightItems.forEach(item => el.matchRight.append(makeChip(item, "right")));

      state.current = { type:"match", answer:"", answerChar:"", hint:"", misses:0 };
    }

    /* ── Bubble pop ───────────────────────────────────── */
    function showBubblePop() {
      state.bubbleLives  = 3;
      state.bubbleMissed = [];
      state.timeLeft     = 10;
      startBubbleTarget();
      el.timer.textContent = state.timeLeft;
      el.timerRow.hidden   = false;
      el.bubbleArena.classList.add("show");
      state.timerId = setInterval(() => {
        state.timeLeft -= 1;
        el.timer.textContent = state.timeLeft;
        if (state.timeLeft <= 0) endBubbleRound();
      }, 1000);
      state.bubbleTargetTimer = setInterval(() => {
        missBubbleTarget("跳過");
        if (!state.locked) startBubbleTarget();
      }, 5000);
    }

    function resetBubbleTargetTimer() {
      clearInterval(state.bubbleTargetTimer);
      state.bubbleTargetTimer = setInterval(() => {
        missBubbleTarget("跳過");
        if (!state.locked) startBubbleTarget();
      }, 5000);
    }

    function startBubbleTarget() {
      clearInterval(state.bubbleId);
      el.bubbleArena.innerHTML = "";
      const target = state.words[Math.floor(Math.random() * state.words.length)];
      state.current = { type:"bubble", answer:target.char, answerChar:target.char, hint:target.definition, misses:0 };
      el.promptLabel.textContent = "快打指定的字";
      el.prompt.textContent      = target.bopomofo;
      el.prompt.className        = "meaning";
      el.promptExtra.textContent = `找：${target.definition}　生命：${"♥".repeat(state.bubbleLives)}`;
      spawnBubbles(target.char);
      state.bubbleId = setInterval(() => spawnBubbles(target.char), 650);
    }

    function missBubbleTarget(reason) {
      if (state.locked || !state.current?.answer) return;
      state.bubbleMissed.push(state.current.answer);
      state.bubbleLives -= 1;
      state.streak = 0;
      recordQuestion("wrong", 0);
      tickPet();
      updateUi();
      setFeedback(`${reason}：「${state.current.answer}」。剩 ${state.bubbleLives} 次機會。`, "wrong");
      if (state.bubbleLives <= 0) endBubbleRound();
    }

    function endBubbleRound() {
      if (state.locked) return;
      state.locked = true;
      clearInterval(state.timerId);
      clearInterval(state.bubbleId);
      clearInterval(state.bubbleTargetTimer);
      state.timerId = state.bubbleId = state.bubbleTargetTimer = null;
      el.bubbleArena.innerHTML = "";
      el.bubbleArena.classList.remove("show");
      el.timerRow.hidden = true;
      const missed = [...new Set(state.bubbleMissed)].filter(c => DATA.entries[c]);
      if (missed.length) {
        setTimeout(() => {
          showMissedCardSequence(missed, () => { state.locked = false; resetRoundUi(); showBubblePop(); });
        }, 400);
      } else {
        setFeedback("時間到！這回合沒有漏掉的字。", "correct");
        setTimeout(() => { state.locked = false; showBubblePop(); }, 1200);
      }
    }

    function spawnBubbles(targetChar) {
      const chars = sample(state.words, 5).map(i => i.char);
      if (!chars.includes(targetChar)) chars[Math.floor(Math.random() * chars.length)] = targetChar;
      chars.forEach(char => {
        const color  = bubbleColors[Math.floor(Math.random() * bubbleColors.length)];
        const bubble = document.createElement("button");
        bubble.className = "bubble";
        bubble.textContent = char;
        bubble.style.left  = `${Math.random() * 80 + 5}%`;
        bubble.style.background  = color.bg;
        bubble.style.borderColor = color.border;
        bubble.style.animationDuration = `${Math.random() * 1.4 + 2.2}s`;
        bubble.addEventListener("click", () => {
          if (char === targetChar) {
            if (state.locked) return;
            state.locked = true;
            clearInterval(state.timerId);
            clearInterval(state.bubbleId);
            bubble.classList.add("burst");
            setTimeout(() => bubble.remove(), 260);
            const rect = bubble.getBoundingClientRect();
            confettiBurst(rect.left + rect.width/2, rect.top + rect.height/2);
            rewardCorrect(1, "first");
            setFeedback("打中了！賺到 1 元。", "correct");
            state.locked = false;
            resetBubbleTargetTimer();
            startBubbleTarget();
          } else {
            bubble.classList.add("burst");
            setTimeout(() => bubble.remove(), 260);
            missBubbleTarget(`不是「${char}」`);
            if (!state.locked) { resetBubbleTargetTimer(); startBubbleTarget(); }
          }
        });
        el.bubbleArena.append(bubble);
        setTimeout(() => bubble.remove(), 3700);
      });
    }

    /* ── Answer rendering ─────────────────────────────── */
    function renderAnswers(choices, labelFor, isCorrect) {
      el.answers.innerHTML = "";
      choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "answer";
        button.textContent = labelFor(choice);
        button.addEventListener("click", () => answer(button, isCorrect(choice)));
        el.answers.append(button);
      });
    }

    function setFeedback(text, type) {
      el.feedback.textContent = text;
      el.feedback.className = "feedback" + (type==="correct"?" fb-correct":type==="wrong"?" fb-wrong":"");
    }

    function answer(button, correct) {
      if (state.locked) return;
      if (correct) {
        state.locked = true;
        const secondTry = state.current.misses > 0;
        const reward    = secondTry ? .5 : 1;
        rewardCorrect(reward, secondTry ? "second" : "first");
        button.classList.add("correct");
        const rect = button.getBoundingClientRect();
        confettiBurst(rect.left + rect.width/2, rect.top);
        setFeedback(`答對了！賺到 ${formatMoney(reward)} 元。`, "correct");
        updateUi();
        setTimeout(pickQuestion, 900);
        return;
      }
      state.current.misses += 1;
      button.classList.add("wrong");
      button.disabled = true;
      if (state.current.misses === 1) { setFeedback("再試一次，答對還可以賺 0.5 元。", ""); return; }
      state.locked = true;
      state.streak = 0;
      recordQuestion("wrong", 0);
      tickPet();
      revealCorrectAnswer();
      updateUi();
      const charToReview = state.current.answerChar || state.current.answer;
      setTimeout(() => {
        if (DATA.entries[charToReview]) {
          showMissedCardSequence([charToReview], () => { state.locked = false; pickQuestion(); });
        } else {
          state.locked = false; pickQuestion();
        }
      }, 800);
    }

    function revealCorrectAnswer() {
      const hint = state.current.hint ? `：${state.current.hint}` : "";
      setFeedback(`答案是「${state.current.answer}」${hint}。`, "wrong");
      document.querySelectorAll(".answer").forEach(b => {
        if (b.textContent === state.current.answer || b.textContent === state.current.hint)
          b.classList.add("correct");
      });
    }

    function rewardCorrect(reward, result = "first") {
      state.streak += 1;
      state.coins   = Math.round((state.coins + reward) * 10) / 10;
      recordQuestion(result, reward);
      addBadgeForProgress();
      tickPet();
      updateUi();
    }

    function tickPet() {
      state.inventory.ownedPets.forEach(pet => {
        const s = state.petStats[pet] ||= { hunger:55, happy:55, clean:55 };
        s.hunger = Math.max(0, s.hunger - 1);
        s.happy  = Math.max(0, s.happy  - 1);
        s.clean  = Math.max(0, s.clean  - 1);
      });
      state.stats = state.petStats[state.inventory.pet];
      saveProgress();
    }

    /* ── Shop / buy ───────────────────────────────────── */
    function buy(key) {
      const item = shop[key];
      if (!item) return;
      const consumable   = item.consumable;
      const permanent    = !consumable;
      const alreadyOwned = state.inventory.owned.includes(key) || state.inventory.pet === item.pet;
      if (alreadyOwned && permanent) { equipOwnedItem(item); return; }
      if (state.coins < item.price)  return;
      state.coins = Math.round((state.coins - item.price) * 10) / 10;
      if (consumable) {
        state.stats = state.petStats[state.inventory.pet] ||= { hunger:55, happy:55, clean:55 };
        state.stats[item.stat] = Math.min(100, state.stats[item.stat] + item.amount);
        if (item.category === "food") state.stats.happy = Math.min(100, state.stats.happy + 3);
      } else if (item.stat) {
        state.stats[item.stat] = Math.min(100, state.stats[item.stat] + item.amount);
      }
      if (item.accessory) {
        state.inventory.owned.push(key);
        state.inventory.accessories.push(key);
        equipOwnedItem(item);
        addBadge("有造型的小寵物");
      }
      if (item.pet) {
        state.inventory.owned.push(key);
        if (!state.inventory.ownedPets.includes(item.pet)) state.inventory.ownedPets.push(item.pet);
        state.petStats[item.pet] ||= { hunger:55, happy:55, clean:55 };
        equipOwnedItem(item);
        addBadge("新寵物加入");
      }
      if (permanent && !state.inventory.owned.includes(key)) state.inventory.owned.push(key);
      addBadge(item.message.replace("！",""));
      setFeedback(item.message, "correct");
      applyInventory();
      saveProgress();
      updateUi();
    }

    function equipOwnedItem(item) {
      if (item.pet) {
        state.inventory.pet = item.pet;
        state.petStats[item.pet] ||= { hunger:55, happy:55, clean:55 };
        state.stats = state.petStats[item.pet];
      }
      if (item.accessory) {
        state.inventory.equipped[item.slot || "head"] = item.key;
      }
      applyInventory();
      saveProgress();
      updateUi();
    }

    /* ── Badges ───────────────────────────────────────── */
    function addBadgeForProgress() {
      if (state.streak === 3)  addBadge("連續答對 3 題 🔥");
      if (state.streak === 5)  addBadge("連續答對 5 題 ⚡");
      if (state.streak === 10) addBadge("連續答對 10 題 🏆");
      if (state.coins  >= 20)  addBadge("存到 20 元 💰");
      if (state.coins  >= 50)  addBadge("存到 50 元 🤑");
    }

    function addBadge(text) { state.earnedBadges.add(text); renderBadges(); }

    function renderBadges() {
      el.badges.innerHTML = "";
      state.earnedBadges.forEach(text => {
        const badge = document.createElement("span");
        badge.className   = "badge";
        badge.textContent = text;
        el.badges.append(badge);
      });
    }

    /* ── Apply inventory visuals ──────────────────────── */
    function applyInventory() {
      const petKey = state.inventory.pet || "dog";
      // Show the correct animal emoji (big and clear)
      el.petEmoji.textContent = petEmojis[petKey] || "🐶";
      // Position accessories over the emoji
      const eq = state.inventory.equipped || {};
      el.accessoryHead.textContent = shop[eq.head]?.accessory || "";
      el.accessoryBody.textContent = shop[eq.body]?.accessory || "";
      el.accessoryFeet.textContent = shop[eq.feet]?.accessory
        ? `${shop[eq.feet].accessory}${shop[eq.feet].accessory}` : "";
      el.accessoryToy.textContent  = shop[eq.toy]?.accessory  || "";
      updatePetExpression();
    }

    /* ── Shop rendering ───────────────────────────────── */
    function renderShopTabs() {
      el.shopTabs.innerHTML = "";
      Object.entries(shopCategories).forEach(([key, group]) => {
        const button = document.createElement("button");
        button.className = "shop-tab";
        button.dataset.category = key;
        button.textContent = group.label;
        button.addEventListener("click", () => { state.shopCategory = key; renderShopTabs(); renderShop(); });
        el.shopTabs.append(button);
      });
    }

    function renderShop() {
      el.shop.innerHTML = "";
      const group = shopCategories[state.shopCategory] || shopCategories.pets;
      group.items.forEach(([key]) => {
        const item     = shop[key];
        const owned    = state.inventory.owned.includes(key) || state.inventory.pet === item.pet;
        const canAfford = state.coins >= item.price;
        const button   = document.createElement("button");
        button.className = "item";
        button.dataset.buy = key;

        let boostHtml = "";
        if (item.category === "food")      boostHtml = `<span class="item-boost">+${item.amount} 肚子</span>`;
        else if (item.category === "bath") boostHtml = `<span class="item-boost">+${item.amount} 乾淨</span>`;
        else if (item.category === "toys") boostHtml = `<span class="item-boost">+${item.amount} 開心</span>`;
        else if (item.slot === "head")     boostHtml = `<span class="item-boost">頭部配件</span>`;
        else if (item.slot === "body")     boostHtml = `<span class="item-boost">身體配件</span>`;
        else if (item.slot === "feet")     boostHtml = `<span class="item-boost">腳部配件</span>`;
        else if (item.slot === "toy")      boostHtml = `<span class="item-boost">玩具配件</span>`;

        const needHtml = (!owned && !canAfford && item.price > 0)
          ? `<span class="item-need">差 ${Math.ceil(item.price - state.coins)} 元</span>` : "";

        button.innerHTML = `
          <span class="item-icon">${item.icon}</span>
          <span>${item.name}</span>
          <span class="price">${item.price > 0 ? item.price + " 元" : "免費"}</span>
          ${boostHtml}${needHtml}
        `;
        button.addEventListener("click", () => buy(key));
        el.shop.append(button);
      });
      document.querySelectorAll(".shop-tab").forEach(b => {
        b.classList.toggle("active", b.dataset.category === state.shopCategory);
      });
      updateUi();
    }

    /* ── Parent dashboard ─────────────────────────────── */
    function renderParentDashboard() {
      const records = Object.entries(state.history).sort(([a],[b]) => b.localeCompare(a));
      const totals  = records.reduce((sum,[,r]) => ({
        days:    sum.days    + (r.played > 0 ? 1 : 0),
        played:  sum.played  + r.played,
        correct: sum.correct + r.correct,
        coins:   Math.round((sum.coins + r.coins) * 10) / 10
      }), { days:0, played:0, correct:0, coins:0 });
      const accuracy = totals.played ? Math.round(totals.correct / totals.played * 100) : 0;
      el.parentStats.innerHTML = `
        <div class="parent-stat"><strong>${totals.days}</strong><span>練習天數</span></div>
        <div class="parent-stat"><strong>${totals.played}</strong><span>完成題數</span></div>
        <div class="parent-stat"><strong>${accuracy}%</strong><span>答對率</span></div>
        <div class="parent-stat"><strong>${formatMoney(totals.coins)}</strong><span>累計賺元</span></div>
      `;
      el.historyList.innerHTML = "";
      records.slice(0, 10).forEach(([date, r]) => {
        const row = document.createElement("div");
        row.className = "history-row";
        const acc = r.played ? Math.round(r.correct / r.played * 100) : 0;
        row.innerHTML = `<span>${date}</span><span>${r.played} 題</span><span>${acc}%</span><span>+${formatMoney(r.coins)} 元</span>`;
        el.historyList.append(row);
      });
    }

    /* ── Global UI update ─────────────────────────────── */
    function updateUi() {
      el.coins.textContent = formatMoney(state.coins);
      updateStatBars();
      updatePetExpression();
      renderStreak();
      updateDailyGoal();
      if (el.shopBanner) el.shopBanner.hidden = state.coins >= 5;
      document.querySelectorAll(".item").forEach(button => {
        const key  = button.dataset.buy;
        const item = shop[key];
        if (!item) return;
        const owned = state.inventory.owned.includes(key) || state.inventory.pet === item.pet;
        const active = (item.pet && state.inventory.pet === item.pet) ||
                       (item.accessory && state.inventory.equipped[item.slot] === item.key);
        button.classList.toggle("owned",  owned);
        button.classList.toggle("active", active);
        const canAfford = state.coins >= item.price;
        button.disabled = !canAfford && !(owned && !item.consumable);
        let needSpan = button.querySelector(".item-need");
        if (!owned && !canAfford && item.price > 0) {
          const deficit = Math.ceil(item.price - state.coins);
          if (!needSpan) { needSpan = document.createElement("span"); needSpan.className = "item-need"; button.appendChild(needSpan); }
          needSpan.textContent = `差 ${deficit} 元`;
        } else if (needSpan) { needSpan.remove(); }
      });
      renderParentDashboard();
    }

    /* ── Event listeners ──────────────────────────────── */
    document.querySelectorAll(".mode").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".mode").forEach(m => m.classList.remove("active"));
        button.classList.add("active");
        state.mode = button.dataset.mode;
        pickQuestion();
      });
    });

    document.querySelectorAll(".challenge-tab").forEach(button => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".challenge-tab").forEach(t => t.classList.remove("active"));
        button.classList.add("active");
        state.challengeType = button.dataset.challenge;
        if (document.body.dataset.view === "challenge") buildChallengePools();
      });
    });

    document.querySelectorAll(".view-tab").forEach(button => {
      button.addEventListener("click", () => {
        document.body.dataset.view = button.dataset.view;
        document.querySelectorAll(".view-tab").forEach(t => t.classList.remove("active"));
        button.classList.add("active");
        state.challengeMode = button.dataset.view === "challenge";
        if (state.challengeMode) { el.reviewGate.hidden = true; buildChallengePools(); }
        else if (button.dataset.view === "practice") buildPools();
      });
    });

    el.prevCard.addEventListener("click", () => { state.reviewIndex = Math.max(0, state.reviewIndex-1); renderReviewCard(); });
    el.nextCard.addEventListener("click", () => { state.reviewIndex = Math.min(state.words.length-1, state.reviewIndex+1); renderReviewCard(); });

    el.finishReview.addEventListener("click", () => { addBadge("看完生字卡 📖"); setPracticeLocked(false); });
    el.reloadDaily.addEventListener("click",  () => { buildPools(); });
    el.practiceDate.addEventListener("change", () => { buildPools(); addBadge("換日期練習"); });

    el.clearHistory.addEventListener("click", () => {
      state.coins     = 0; state.streak = 0;
      state.stats     = { hunger:55, happy:55, clean:55 };
      state.inventory = { pet:"dog", accessories:[], equipped:{}, owned:[], ownedPets:["dog"] };
      state.petStats  = { dog:{ hunger:55, happy:55, clean:55 } };
      state.history   = {};
      saveProgress(); applyInventory(); renderStreak(); updateUi();
    });

    el.closePenalty.addEventListener("click", () => { el.penaltyOverlay.hidden = true; });

    /* ── Boot ─────────────────────────────────────────── */
    const scheduleDates = Object.keys(DATA.schedule).sort();
    el.practiceDate.min = scheduleDates[0];
    el.practiceDate.max = scheduleDates[scheduleDates.length - 1];
    document.body.dataset.view = "practice";
    loadProgress();
    checkDailyEnforcement();
    buildPools();
    applyInventory();
    renderShopTabs();
    renderShop();
    renderBadges();
    updateUi();
  </script>
</body>
</html>
